openapi: 3.1.0
info:
  title: issue-17485
  version: 0.1.0
servers:
- url: http://api.example.xyz/v1
paths:
  /user:
    get:
      parameters:
      - description: The name of the user
        explode: false
        in: path
        name: username
        required: true
        schema:
          items:
            pattern: "^[a-zA-Z0-9]$"
            type: string
          type: array
          default: null
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: OK
      tags:
      - user
      x-accepts:
      - application/json
components:
  schemas:
    User:
      example:
        username: username
        email: email
      properties:
        username:
          type: string
        email:
          description: The user's contact email address
          format: email
          type: string
      required:
      - email

