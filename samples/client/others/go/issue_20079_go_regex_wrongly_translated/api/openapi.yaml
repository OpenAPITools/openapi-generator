openapi: 3.0.3
info:
  title: API Test
  version: "1.0"
servers:
- url: /
paths:
  /foo:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_foo_get_200_response"
          description: OK
components:
  schemas:
    importCode:
      example:
        date: date
        code: code
        javaComments: javaComments
        socialSecurityNumber: socialSecurityNumber
        ipAddress: ipAddress
        url: url
        positiveNegativeDecimalValue: positiveNegativeDecimalValue
        htmlHexadecimalColorCode1: htmlHexadecimalColorCode1
        email2: email2
        email1: email1
        htmlHexadecimalColorCode2: htmlHexadecimalColorCode2
        phoneNumber: phoneNumber
        money: money
        windowsAbsolutePath: windowsAbsolutePath
        sentence1: sentence1
        sentence2: sentence2
        password2: password2
        password1: password1
        creditCard: creditCard
      properties:
        code:
          pattern: "^[0-9]{2,}$"
          type: string
        creditCard:
          description: |-
            Visa credit card
             matches: 4123 6453 2222 1746
             non-matches: 3124 5675 4400 4567, 4123-6453-2222-1746
          pattern: "^4[0-9]{3}\\s[0-9]{4}\\s[0-9]{4}\\s[0-9]{4}$"
          type: string
        date:
          description: |-
            Some dates
             matches: 31/04/1999, 15/12/4567
             non-matches: 31/4/1999, 31/4/99, 1999/04/19, 42/67/25456
          pattern: "^([0-2][0-9]|30|31)/(0[1-9]|1[0-2])/[0-9]{4}$"
          type: string
        windowsAbsolutePath:
          description: |-
            Windows absolute path
             matches: \\server\share\file
             non-matches: \directory\directory2, /directory2
          type: string
        email1:
          description: |-
            Email Address 1
             matches: abc.123@def456.com, _123@abc.ca
             non-matches: abc@dummy, ab*cd@efg.hijkl
          pattern: "^[[:word:]\\-.]+@[[:word:]\\-.]+\\.[[:alpha:]]{2,3}$"
          type: string
        email2:
          description: |-
            Email Address 2
             matches: *@qrstuv@wxyz.12345.com, __1234^%@@abc.def.ghijkl
             non-matches: abc.123.*&ca, ^%abcdefg123
          pattern: ^.+@.+\..+$
          type: string
        htmlHexadecimalColorCode1:
          description: |-
            HTML Hexadecimal Color Code 1
             matches: AB1234, CCCCCC, 12AF3B
             non-matches: 123G45, 12-44-CC
          pattern: "^[A-F0-9]{6}$"
          type: string
        htmlHexadecimalColorCode2:
          description: |-
            HTML Hexadecimal Color Code 2
             matches: AB 11 00, CC 12 D3
             non-matches: SS AB CD, AA BB CC DD, 1223AB
          pattern: "^[A-F0-9]{2}\\s[A-F0-9]{2}\\s[A-F0-9]{2}$"
          type: string
        ipAddress:
          description: |-
            IP Address
             matches: 10.25.101.216
             non-matches: 0.0.0, 256.89.457.02
          pattern: "^((2(5[0-5]|[0-4][0-9])|1([0-9][0-9])|([1-9][0-9])|[0-9])\\.){3}(2(5[0-5]|[0-4][0-9])|1([0-9][0-9])|([1-9][0-9])|[0-9])$"
          type: string
        javaComments:
          description: |-
            Java Comments
             matches: Matches Java comments that are between /* and */, or one line comments prefaced by //
             non-matches: a=1
          type: string
        money:
          description: |2-

             matches: $1.00, -$97.65 non-matches: $1, 1.00$, $-75.17
          pattern: "^(\\+|-)?\\$[0-9]*\\.[0-9]{2}$"
          type: string
        positiveNegativeDecimalValue:
          description: |-
            Positive, negative numbers, and decimal values
             matches: +41, -412, 2, 7968412, 41, +41.1, -3.141592653 non-matches: ++41, 41.1.19, -+97.14
          pattern: "^(\\+|-)?[0-9]+(\\.[0-9]+)?$"
          type: string
        password1:
          description: |-
            Passwords 1
             matches: abcd, 1234, A1b2C3d4, 1a2B3
             non-matches: abc, *ab12, abcdefghijkl
          pattern: "^[[:alnum:]]{4,10}$"
          type: string
        password2:
          description: |-
            Passwords 2
             matches: AB_cd, A1_b2c3, a123_
             non-matches: *&^g, abc, 1bcd
          pattern: "^[a-zA-Z]\\w{3,7}$"
          type: string
        phoneNumber:
          description: |-
            Phone Numbers
             matches: 519-883-6898, 519 888 6898
             non-matches: 888 6898, 5198886898, 519 883-6898
          pattern: "^([2-9][0-9]{2}-[2-9][0-9]{2}-[0-9]{4})|([2-9][0-9]{2}\\s[2-9][0-9]{2}\\\
            s[0-9]{4})$"
          type: string
        sentence1:
          description: |-
            Sentences 1
             matches: Hello, how are you?
             non-matches: i am fine
          pattern: "^[A-Z0-9].*(\\.|\\?|!)$"
          type: string
        sentence2:
          description: |-
            Sentences 2
             matches: Hello, how are you?n non-matches: i am fine
          pattern: "^[[:upper:]0-9].*[.?!]$"
          type: string
        socialSecurityNumber:
          description: |-
            Social Security Number
             matches: 123-45-6789
             non-matches: 123 45 6789, 123456789, 1234-56-7891
          pattern: "^[0-9]{3}-[0-9]{2}-[0-9]{4}$"
          type: string
        url:
          description: |-
            URL
             matches: http://www.sample.com, www.sample.com
             non-matches: http://sample.com, http://www.sample.comm
          pattern: "^(http://)?www\\.[a-zA-Z0-9]+\\.[a-zA-Z]{2,3}$"
          type: string
      type: object
    _foo_get_200_response:
      example:
        code:
          date: date
          code: code
          javaComments: javaComments
          socialSecurityNumber: socialSecurityNumber
          ipAddress: ipAddress
          url: url
          positiveNegativeDecimalValue: positiveNegativeDecimalValue
          htmlHexadecimalColorCode1: htmlHexadecimalColorCode1
          email2: email2
          email1: email1
          htmlHexadecimalColorCode2: htmlHexadecimalColorCode2
          phoneNumber: phoneNumber
          money: money
          windowsAbsolutePath: windowsAbsolutePath
          sentence1: sentence1
          sentence2: sentence2
          password2: password2
          password1: password1
          creditCard: creditCard
      properties:
        code:
          $ref: "#/components/schemas/importCode"
      type: object
