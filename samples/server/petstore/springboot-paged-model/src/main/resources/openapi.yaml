openapi: 3.0.1
info:
  description: |
    Test spec for substituteGenericPagedModel feature.

    Contains schemas that SHOULD be detected as paged models:
      - UserPage       : flat-object form, PageMetadata defined inline
      - OrderPage      : flat-object form, PageMetadata defined in external file
      - PetPageAllOf   : allOf form, PageMeta defined inline

    And schemas that should NOT be detected:
      - UserList       : has a 'content' array but no pagination-metadata property
      - SearchResult   : no 'content' property at all
      - PetSort        : a plain string enum — unrelated

    Operations returning detected schemas will have their return type
    replaced with PagedModel<T>; operations returning non-detected schemas are untouched.
  title: OpenAPI Petstore - PagedModel Substitution Test
  version: 1.0.0
servers:
- url: http://petstore.swagger.io/v2
tags:
- description: User operations
  name: user
- description: Order operations
  name: order
- description: Pet operations
  name: pet
paths:
  /users:
    get:
      operationId: listUsers
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          type: integer
        style: form
      - explode: true
        in: query
        name: size
        required: false
        schema:
          default: 20
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"
          description: Paged list of users
      summary: List users (returns UserPage — should be replaced with PagedModel<User>)
      tags:
      - user
      x-accepts:
      - application/json
      x-tags:
      - tag: user
  /orders:
    get:
      operationId: listOrders
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          type: integer
        style: form
      - explode: true
        in: query
        name: size
        required: false
        schema:
          default: 20
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPage"
          description: Paged list of orders
      summary: List orders (returns OrderPage — PageMetadata lives in external file)
      tags:
      - order
      x-accepts:
      - application/json
      x-tags:
      - tag: order
  /pets/paged:
    get:
      operationId: listPetsPaged
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetPageAllOf"
          description: Paged list of pets
      summary: List pets using allOf paged form (returns PetPageAllOf)
      tags:
      - pet
      x-accepts:
      - application/json
      x-tags:
      - tag: pet
  /users/list:
    get:
      operationId: listUsersSimple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
          description: Plain list
      summary: Simple list of users — UserList should NOT be suppressed
      tags:
      - user
      x-accepts:
      - application/json
      x-tags:
      - tag: user
  /pets/search:
    get:
      operationId: searchPets
      parameters:
      - explode: true
        in: query
        name: q
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
          description: Search result
      summary: Search result with no content array — SearchResult should NOT be suppressed
      tags:
      - pet
      x-accepts:
      - application/json
      x-tags:
      - tag: pet
  /pets:
    get:
      operationId: findPets
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Pet"
                type: array
          description: List of pets
      summary: "Find pets — returns raw array, no PagedModel replacement"
      tags:
      - pet
      x-accepts:
      - application/json
      x-tags:
      - tag: pet
components:
  schemas:
    User:
      example:
        name: name
        id: id
      properties:
        id:
          type: string
        name:
          type: string
      type: object
    Pet:
      example:
        name: name
        id: 5
        status: status
      properties:
        id:
          format: int64
          type: integer
        name:
          type: string
        status:
          type: string
      required:
      - name
      type: object
    PageMeta:
      description: Shared pagination metadata schema
      example:
        number: 6
        size: 0
        totalPages: 5
        totalElements: 1
      properties:
        size:
          format: int64
          type: integer
        number:
          format: int64
          type: integer
        totalElements:
          format: int64
          type: integer
        totalPages:
          format: int64
          type: integer
      required:
      - number
      - size
      - totalElements
      - totalPages
      type: object
    UserPage:
      description: Paged list of users — flat-object form with inline PageMeta
      example:
        page:
          number: 6
          size: 0
          totalPages: 5
          totalElements: 1
        content:
        - name: name
          id: id
        - name: name
          id: id
      properties:
        content:
          items:
            $ref: "#/components/schemas/User"
          type: array
        page:
          $ref: "#/components/schemas/PageMeta"
      required:
      - content
      - page
      type: object
    OrderPage:
      description: Paged list of orders — flat-object form with external PageMetadata
      example:
        page:
          number: 1
          size: 6
          totalPages: 5
          totalElements: 5
        content:
        - amount: 0.8008281904610115
          id: id
        - amount: 0.8008281904610115
          id: id
      properties:
        content:
          items:
            $ref: "#/components/schemas/Order"
          type: array
        page:
          $ref: "#/components/schemas/PageMetadata"
      required:
      - content
      - page
      type: object
    PetPageAllOf:
      allOf:
      - $ref: "#/components/schemas/PageMeta"
      - properties:
          content:
            items:
              $ref: "#/components/schemas/Pet"
            type: array
        type: object
      description: Paged list of pets — allOf form
      example:
        number: 6
        size: 0
        totalPages: 5
        content:
        - name: name
          id: 5
          status: status
        - name: name
          id: 5
          status: status
        totalElements: 1
    UserList:
      description: A plain list wrapper — has content array but no pagination metadata
        property
      example:
        description: description
        content:
        - name: name
          id: id
        - name: name
          id: id
      properties:
        content:
          items:
            $ref: "#/components/schemas/User"
          type: array
        description:
          type: string
      type: object
    SearchResult:
      description: Search result with metadata — no 'content' array at all
      example:
        totalHits: 0
        query: query
        page:
          number: 6
          size: 0
          totalPages: 5
          totalElements: 1
      properties:
        query:
          type: string
        totalHits:
          type: integer
        page:
          $ref: "#/components/schemas/PageMeta"
      type: object
    PetSort:
      enum:
      - "id,asc"
      - "id,desc"
      - "name,asc"
      - "name,desc"
      type: string
    Order:
      example:
        amount: 0.8008281904610115
        id: id
      properties:
        id:
          type: string
        amount:
          format: double
          type: number
      type: object
    PageMetadata:
      example:
        number: 1
        size: 6
        totalPages: 5
        totalElements: 5
      properties:
        size:
          format: int64
          type: integer
        number:
          format: int64
          type: integer
        totalElements:
          format: int64
          type: integer
        totalPages:
          format: int64
          type: integer
      required:
      - number
      - size
      - totalElements
      - totalPages
      type: object
