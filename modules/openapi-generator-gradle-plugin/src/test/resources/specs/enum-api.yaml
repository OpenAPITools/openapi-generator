openapi: "3.0.0"
info:
  version: 1.0.0
  title: Enum Test API
servers:
  - url: http://example.com/v1
paths:
  /items:
    get:
      summary: List items
      operationId: listItems
      tags:
        - items
      responses:
        '200':
          description: A list of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
components:
  schemas:
    Item:
      required:
        - id
        - status
      properties:
        id:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/ItemStatus"
    ItemStatus:
      type: string
      enum:
        - active
        - inactive
        - pending
