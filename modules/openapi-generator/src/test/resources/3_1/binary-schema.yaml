openapi: 3.1.0
info:
  title: t
  version: 1.0.0
paths:
  /upload:
    post:
      operationId: upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadBody'
      responses:
        '200':
          description: ok
components:
  schemas:
    UploadBody:
      type: object
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
        nullableFile:
          type:
            - string
            - 'null'
          contentMediaType: application/octet-stream
        encodedFile:
          type: string
          contentEncoding: base64
          contentMediaType: application/octet-stream
        inferredFile:
          contentMediaType: application/octet-stream
        image:
          type: string
          contentMediaType: image/png
      required:
        - file
