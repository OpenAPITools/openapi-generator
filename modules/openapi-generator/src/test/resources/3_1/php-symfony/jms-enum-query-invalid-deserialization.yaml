openapi: 3.1.0
info:
  title: php-symfony JMS invalid query enum deserialization
  version: '1.0'
paths:
  /pets:
    get:
      operationId: listPets
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Pet.Model.PetStatus'
      responses:
        '200':
          description: OK
components:
  schemas:
    Pet.Model.PetStatus:
      type: string
      enum:
        - available
        - pending
        - sold
