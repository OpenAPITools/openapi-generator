# OAS document that tests for a regression when useBeanValidation=true and lists with a pattern.
openapi: 3.1.0
info:
  title: issue-17485
  version: 0.1.0
servers:
  - url: http://api.example.xyz/v1
paths:
  /user:
    get:
      tags:
        - user
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user
          schema:
            type: array
            items:
              type: string
              pattern: "^[a-zA-Z0-9]$"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
components:
  schemas:
    User:
      type: object
      required:
        - email
      properties:
        username:
          type: string
        email:
          type: string
          format: email
          description: The user's contact email address
