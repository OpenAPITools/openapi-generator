openapi: 3.1.0
info:
  title: Pure SSE object probe
  version: 1.0.0
paths:
  /events:
    get:
      tags:
        - SSE
      operationId: getEvents
      responses:
        '200':
          description: SSE streaming of regular object events
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/Evt'
components:
  schemas:
    Evt:
      type: object
      properties:
        msg:
          type: string
