openapi: 3.1.0
info:
  title: Cpp Boost Beast composed schema lowering
  version: 1.0.0
paths:
  /variant-body:
    post:
      tags:
        - ComposedSchema
      operationId: postVariantBody
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputParam'
      responses:
        '200':
          description: Variant request/response round-trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputParam'
  /alias-body:
    post:
      tags:
        - ComposedSchema
      operationId: postAliasBody
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelIdsResponses'
      responses:
        '200':
          description: Alias request/response round-trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelIdsResponses'
components:
  schemas:
    # Scenario 1: anyOf with string + string-enum → std::string
    ModelIdsResponses:
      anyOf:
        - type: string
        - type: string
          enum:
            - id
            - ids

    # Scenario 2: oneOf string + array → std::variant<std::string, std::vector<InputItem>>
    InputParam:
      oneOf:
        - type: string
        - type: array
          items:
            $ref: '#/components/schemas/InputItem'
    InputItem:
      type: object
      properties:
        name:
          type: string

    # Scenario 3: allOf flattened — CreateResponse has model and input directly
    CreateResponse:
      allOf:
        - $ref: '#/components/schemas/CreateResponseBase'
        - type: object
          properties:
            input:
              type: string
    CreateResponseBase:
      type: object
      properties:
        model:
          type: string

    # Scenario 4: nullable property (OAS 3.0 style)
    TemperatureContainer:
      type: object
      properties:
        temperature:
          type: number
          nullable: true

    # Scenario 5: OAS 3.1 oneOf [null, T] → std::optional<T>
    OptionalScore:
      oneOf:
        - type: "null"
        - type: number

    # Scenario 6: OpenAI-style temperature (anyOf number + null)
    OpenAITemperature:
      type: object
      properties:
        temperature:
          anyOf:
            - type: number
            - type: "null"

    # Scenario 7: $ref holder — property that references a composed model
    RefHolder:
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/ModelIdsResponses'
        param:
          $ref: '#/components/schemas/InputParam'

    # Scenario 8: oneOf with discriminator
    PetByType:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
      discriminator:
        propertyName: pet_type
        mapping:
          cat: Cat
          dog: Dog
    Cat:
      type: object
      properties:
        pet_type:
          type: string
          enum: [cat]
        meow_volume:
          type: integer
    Dog:
      type: object
      properties:
        pet_type:
          type: string
          enum: [dog]
        bark_volume:
          type: integer

    # Scenario 9: Deduplication — oneOf with duplicate string branches
    DedupTest:
      oneOf:
        - type: string
        - type: string
          enum: [a, b]
        - type: integer

    # Scenario 10: Single non-null branch collapse
    SingleBranchTest:
      anyOf:
        - type: string
          enum: [x, y]

    # Scenario 11: All-null branches → boost::json::value
    AllNullTest:
      anyOf:
        - type: "null"
        - type: "null"

    # Scenario 12: x-stainless-const property handling
    StainlessObject:
      type: object
      properties:
        type:
          type: string
          const: text
          x-stainless-const: true
        count:
          type: integer
          format: int32
          const: 42
          x-stainless-const: true
