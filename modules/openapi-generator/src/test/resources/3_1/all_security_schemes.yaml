openapi: 3.1.0
servers:
  - url: 'http://petstore.swagger.io/v2'
info:
  description: >-
    This is OpenAPI spec with all possible security schemes.
  version: 1.0.0
  title: OpenAPI All Security Schemes
  license:
    name: Apache-2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0.html'
paths:
  '/pet/{petId}':
    parameters:
      - name: petId
        in: path
        description: ID of pet to return
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - pet
      summary: Find pet by ID
      description: Returns a single pet
      operationId: getPetById
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid ID supplied
        '404':
          description: Pet not found
      security:
        - api_key1: []
        - api_key2: []

components:
  securitySchemes:
    api_key1:
      type: apiKey
      description: API Key Authentication sample 1
      name: api_key
      in: header
    api_key2:
      type: apiKey
      description: API Key Authentication sample 2
      name: api_key
      in: query
    http1:
      type: http
      description: HTTP Authentication sample 1
      scheme: bearer
      bearerFormat: JWT
    http2:
      type: http
      description: HTTP Authentication sample 2
      scheme: basic
    mutualTLS1:
      type: mutualTLS
      description: Mutual TLS Authentication sample 1
    mutualTLS2:
      type: mutualTLS
      description: Mutual TLS Authentication sample 2
    oauth2_1:
      type: oauth2
      description: OAuth2 Authentication sample 1
      flows:
        implicit:
          authorizationUrl: 'http://petstore.swagger.io/api/oauth/dialog'
          scopes:
            'write:pets': modify pets in your account
            'read:pets': read your pets
    oauth2_2:
      type: oauth2
      description: OAuth2 Authentication sample 2
      flows:
        password:
          tokenUrl: 'http://petstore.swagger.io/api/oauth/token'
          scopes:
            'write:pets': modify pets in your account
            'read:pets': read your pets
    openIdConnect1:
      type: openIdConnect
      description: OpenID Connect Authentication sample 1
      openIdConnectUrl: 'http://petstore.swagger.io/.well-known/openid-configuration'
    openIdConnect2:
      type: openIdConnect
      description: OpenID Connect Authentication sample 2
      openIdConnectUrl: 'http://petstore.swagger.io/.well-known/openid-configuration2'

  responses:
    JustAnotherResponse:
      description: JustAnotherResponse
      content:
        application/json:
          schema:
            type: object
            properties:
              uuid:
                type: integer
              label:
                type: string
  requestBodies:
    Pet:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Pet'
        application/xml:
          schema:
            $ref: '#/components/schemas/Pet'
      description: Pet object that needs to be added to the store
      required: true
  schemas:
    Order:
      title: Pet Order
      description: An order for a pets from the pet store
      type: object
      properties:
        id:
          type: integer
          format: int64
        petId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
        shipDate:
          type: string
          format: date-time
        status:
          type: string
          description: Order Status
          enum:
            - placed
            - approved
            - delivered
        complete:
          type: boolean
          default: false
      xml:
        name: Order
    Category:
      title: Pet category
      description: A category for a pet
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          pattern: '^[a-zA-Z0-9]+[a-zA-Z0-9\.\-_]*[a-zA-Z0-9]+$'
      xml:
        name: Category
    User:
      title: a User
      description: A User who is purchasing from the pet store
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        userStatus:
          type: integer
          format: int32
          description: User Status
      xml:
        name: User
    Tag:
      title: Pet Tag
      description: A tag for a pet
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: Tag
    Pet:
      title: a Pet
      description: A pet for sale in the pet store
      type: object
      required:
        - name
        - photoUrls
      properties:
        id:
          type: integer
          format: int64
        category:
          $ref: '#/components/schemas/Category'
        name:
          type: string
          example: doggie
        photoUrls:
          type: array
          xml:
            name: photoUrl
            wrapped: true
          items:
            type: string
        tags:
          type: array
          xml:
            name: tag
            wrapped: true
          items:
            $ref: '#/components/schemas/Tag'
        status:
          type: string
          description: pet status in the store
          deprecated: true
          enum:
            - available
            - pending
            - sold
      xml:
        name: Pet
    ApiResponse:
      title: An uploaded response
      description: Describes the result of uploading an image resource
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
