openapi: 3.0.4
info:
  title: "Different response schemas including an empty one"
  version: "1.0.0"
paths:
  /empty-success:
    get:
      operationId: emptySuccessResponse
      responses:
        '200':
          description: "A successful response with data"
          content:
            application/json:
              schema:
                type: integer
        '204':
          description: "A successful empty response"
        '400':
          description: "A bad request with a message"
          content:
            application/json:
              schema:
                type: string
  /empty-error:
    get:
      operationId: emptyErrorResponse
      responses:
        '200':
          description: "A successful response with data"
          content:
            application/json:
              schema:
                type: number
        '500':
          description: "An internal server error with no content"
          content: { }
