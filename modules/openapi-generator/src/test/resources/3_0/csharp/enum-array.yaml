openapi: 3.0.0
info:
  title: Enum Array Test
  description: >-
    Tests that array-of-enum properties are serialized and deserialized using
    the defined enum rendering functions rather than falling back to default
    PascalCase JSON serialization.
  version: 1.0.0
  license:
    name: Apache-2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0.html'
paths:
  /shipments:
    get:
      operationId: GetShipments
      tags:
        - Shipments
      responses:
        '200':
          description: Returns a list of shipments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shipment'
servers:
  - url: 'http://localhost'
components:
  schemas:
    Shipment:
      type: object
      required:
        - id
        - allowedMethods
      properties:
        id:
          type: integer
          format: int32
        allowedMethods:
          type: array
          items:
            $ref: '#/components/schemas/ShippingMethod'
        preferredMethod:
          $ref: '#/components/schemas/ShippingMethod'
    ShippingMethod:
      type: string
      enum:
        - standard
        - express
        - overnight
