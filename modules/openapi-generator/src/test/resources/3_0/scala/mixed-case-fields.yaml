openapi: 3.0.0
info:
  title: Mixed Case Test
  version: 1.0.0
paths:
  /test:
    get:
      operationId: getTest
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MixedCaseModel'
components:
  schemas:
    MixedCaseModel:
      type: object
      properties:
        first-name:
          type: string
        phone_number:
          type: string
        lastName:
          type: string
        ZipCode:
          type: string
        address:
          type: string
    BinaryPayload:
      type: object
      properties:
        data:
          type: string
          format: binary
        metadata:
          type: object
    Animal:
      type: object
      required:
        - className
      properties:
        className:
          type: string
        color:
          type: string
          default: red
      discriminator:
        propertyName: className
        mapping:
          DOG: '#/components/schemas/Dog'
          CAT: '#/components/schemas/Cat'
    Cat:
      allOf:
        - $ref: '#/components/schemas/Animal'
        - type: object
          properties:
            declawed:
              type: boolean
    Dog:
      allOf:
        - $ref: '#/components/schemas/Animal'
        - type: object
          properties:
            breed:
              type: string
