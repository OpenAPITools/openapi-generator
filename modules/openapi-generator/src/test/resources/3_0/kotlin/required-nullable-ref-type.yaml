openapi: 3.0.0
info:
  title: Required and Nullable with Ref Type Test
  version: 1.0.0
paths:
  /test:
    post:
      operationId: testPost
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestModel'
      responses:
        '200':
          description: OK
components:
  schemas:
    RefType:
      type: object
      properties:
        value:
          type: string
    TestModel:
      type: object
      required:
        - requiredNonNullable
      properties:
        # required non-nullable (baseline)
        requiredNonNullable:
          type: string
          nullable: false
        # Scenario 4 variant: optional, nullable, type is a $ref — should be JsonNullable<RefType>
        # (or JsonNullable<MappedType> when RefType is schema-mapped)
        optionalNullableRef:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RefType'
