openapi: 3.0.3
info:
  title: ktor header param primitive conversion
  version: 1.0.0
paths:
  /headers:
    get:
      operationId: getWithHeaders
      parameters:
        - name: bool-header
          in: header
          required: false
          schema:
            type: boolean
        - name: int-header
          in: header
          required: false
          schema:
            type: integer
            format: int32
        - name: long-header
          in: header
          required: false
          schema:
            type: integer
            format: int64
        - name: double-header
          in: header
          required: false
          schema:
            type: number
            format: double
        - name: number-header
          in: header
          required: false
          schema:
            type: number
      responses:
        '200':
          description: ok
