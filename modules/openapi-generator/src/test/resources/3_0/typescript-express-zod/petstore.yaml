openapi: 3.0.3
info:
  title: Bookstore API
  description: >
    Minimal spec used by the typescript-express-zod-server / -client samples.
    It stays within the generators' currently supported surface (each request
    body and response is a single named model, or a void/no-content response)
    while still exercising path/query params, nested & nullable $ref properties,
    enum refs, and a discriminated union.
  version: 1.0.0
tags:
  - name: catalog
    description: Book catalog operations
  - name: authors
    description: Author operations
paths:
  /books/{bookId}:
    get:
      tags: [catalog]
      operationId: getBook
      summary: Get a book by id
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: expand
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: The requested book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [catalog]
      operationId: deleteBook
      summary: Delete a book
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Deleted
  /books:
    post:
      tags: [catalog]
      operationId: createBook
      summary: Create a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
      responses:
        '201':
          description: The created book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
  /books/{bookId}/latest-event:
    get:
      tags: [catalog]
      operationId: getLatestBookEvent
      summary: Get the latest event for a book (discriminated union response)
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The latest event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookEvent'
  /authors/{authorId}:
    get:
      tags: [authors]
      operationId: getAuthor
      summary: Get an author by id
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The requested author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
  /authors:
    post:
      tags: [authors]
      operationId: createAuthor
      summary: Create an author
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Author'
      responses:
        '201':
          description: The created author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
components:
  schemas:
    Genre:
      type: string
      enum: [FICTION, NONFICTION, POETRY]
    Author:
      type: object
      required: [name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Book:
      type: object
      required: [title]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        genre:
          $ref: '#/components/schemas/Genre'
        author:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Author'
        pageCount:
          type: integer
          format: int32
          nullable: true
    CreateBookRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        genre:
          $ref: '#/components/schemas/Genre'
        authorId:
          type: integer
          format: int64
    BookAddedEvent:
      type: object
      required: [type, bookId]
      properties:
        type:
          type: string
          enum: [BOOK_ADDED]
        bookId:
          type: integer
          format: int64
    BookRemovedEvent:
      type: object
      required: [type, bookId]
      properties:
        type:
          type: string
          enum: [BOOK_REMOVED]
        bookId:
          type: integer
          format: int64
    BookEvent:
      oneOf:
        - $ref: '#/components/schemas/BookAddedEvent'
        - $ref: '#/components/schemas/BookRemovedEvent'
      discriminator:
        propertyName: type
        mapping:
          BOOK_ADDED: '#/components/schemas/BookAddedEvent'
          BOOK_REMOVED: '#/components/schemas/BookRemovedEvent'
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
