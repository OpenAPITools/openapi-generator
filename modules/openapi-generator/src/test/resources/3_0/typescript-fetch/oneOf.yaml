openapi: 3.0.0
info:
  version: 1.0.0
  title: testing oneOf without discriminator
servers:
  - url: http://localhost:3000
paths:
  /test:
    get:
      operationId: test
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResponse'
  /test-array:
    get:
      operationId: testArray
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestArrayResponse'
  /test-discriminator:
    get:
      operationId: testDiscriminator
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestDiscriminatorResponse'
  /test-snake-case-discriminator:
    get:
      operationId: testSnakeCaseDiscriminator
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestSnakeCaseDiscriminatorResponse'
  /test-dashed-discriminator:
    get:
      operationId: testDashedDiscriminator
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestDashedDiscriminatorResponse'
components:
  schemas:
    TestArrayResponse:
      oneOf:
        - type: array
          items:
            $ref: "#/components/schemas/TestA"
        - type: array
          items:
            $ref: "#/components/schemas/TestB"
        - type: array
          items:
            type: string
    TestDiscriminatorResponse:
      discriminator:
        propertyName: discriminatorField
        mapping:
          optionOne: "#/components/schemas/OptionOne"
          optionTwo: "#/components/schemas/OptionTwo"
      oneOf:
        - $ref: "#/components/schemas/OptionOne"
        - $ref: "#/components/schemas/OptionTwo"
    TestResponse:
      oneOf:
        - $ref: "#/components/schemas/TestA"
        - $ref: "#/components/schemas/TestB"
        - type: string
    TestA:
      type: object
      properties:
        foo:
          type: string
      required:
        - foo
    TestB:
      type: object
      properties:
        bar:
          type: string
      required:
        - bar
    OptionOne:
      type: object
      properties:
        discriminatorField:
          enum:
            - "optionOne"
          type: string
      required:
        - discriminatorField
    OptionTwo:
      type: object
      properties:
        discriminatorField:
          enum:
            - "optionTwo"
          type: string
      required:
        - discriminatorField
    NumericSingletonEnumModel:
      type: object
      properties:
        kind:
          type: integer
          enum:
            - 42
      required:
        - kind
    TestSnakeCaseDiscriminatorResponse:
      discriminator:
        propertyName: discriminator_field
        mapping:
          snakeOptionOne: "#/components/schemas/SnakeOptionOne"
          snakeOptionTwo: "#/components/schemas/SnakeOptionTwo"
      oneOf:
        - $ref: "#/components/schemas/SnakeOptionOne"
        - $ref: "#/components/schemas/SnakeOptionTwo"
    SnakeOptionOne:
      type: object
      properties:
        discriminator_field:
          enum:
            - "snakeOptionOne"
          type: string
        some_property:
          type: string
      required:
        - discriminator_field
        - some_property
    SnakeOptionTwo:
      type: object
      properties:
        discriminator_field:
          enum:
            - "snakeOptionTwo"
          type: string
        some_property:
          type: string
      required:
        - discriminator_field
        - some_property
    TestDashedDiscriminatorResponse:
      discriminator:
        propertyName: discriminator-field
        mapping:
          dashedOptionOne: "#/components/schemas/DashedOptionOne"
          dashedOptionTwo: "#/components/schemas/DashedOptionTwo"
      oneOf:
        - $ref: "#/components/schemas/DashedOptionOne"
        - $ref: "#/components/schemas/DashedOptionTwo"
    DashedOptionOne:
      type: object
      properties:
        discriminator-field:
          enum:
            - "dashedOptionOne"
          type: string
        some-property:
          type: string
      required:
        - discriminator-field
        - some-property
    DashedOptionTwo:
      type: object
      properties:
        discriminator-field:
          enum:
            - "dashedOptionTwo"
          type: string
        some-property:
          type: string
      required:
        - discriminator-field
        - some-property