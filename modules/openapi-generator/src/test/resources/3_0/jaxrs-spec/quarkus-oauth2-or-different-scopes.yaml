openapi: 3.0.1
info:
  title: Quarkus OAuth2 OR different scopes — union test
  version: '1.0'
servers:
  - url: 'http://localhost:8080/'
paths:
  /items:
    get:
      operationId: getItems
      summary: GET — OR two scoped alternatives; expect union {"admin", "user"}
      security:
        - oauth2_scheme:
            - admin
        - oauth2_scheme:
            - user
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    oauth2_scheme:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://example.com/oauth/token
          scopes:
            admin: Admin access
            user: User access
