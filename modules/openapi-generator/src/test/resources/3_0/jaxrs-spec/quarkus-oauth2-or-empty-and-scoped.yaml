openapi: 3.0.1
info:
  title: Quarkus OAuth2 OR empty-and-scoped test
  version: '1.0'
servers:
  - url: 'http://localhost:8080/'
paths:
  /items:
    get:
      operationId: getItems
      summary: Get items — OR any-authenticated OR scoped
      security:
        - oauth2_no_scope: []
        - oauth2_with_scope:
            - admin
      responses:
        '200':
          description: OK
    post:
      operationId: createItem
      summary: Create item — scoped only
      security:
        - oauth2_with_scope:
            - admin
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    oauth2_no_scope:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://example.com/oauth/token
          scopes: {}
    oauth2_with_scope:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://example.com/oauth/token
          scopes:
            admin: Admin access
