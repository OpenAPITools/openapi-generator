openapi: 3.0.1
info:
  title: Quarkus OAuth2 with scopes test
  version: '1.0'
servers:
  - url: 'http://localhost:8080/'
paths:
  /items:
    get:
      operationId: getItems
      summary: Get items
      security:
        - oauth2_scheme:
            - read:items
      responses:
        '200':
          description: OK
    post:
      operationId: createItem
      summary: Create item
      security:
        - oauth2_scheme:
            - write:items
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    oauth2_scheme:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://example.com/oauth/token
          scopes:
            read:items: Read items
            write:items: Write items
