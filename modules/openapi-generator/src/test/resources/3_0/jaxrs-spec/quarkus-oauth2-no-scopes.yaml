openapi: 3.0.1
info:
  title: Quarkus OAuth2 no scopes test
  version: '1.0'
servers:
  - url: 'http://localhost:8080/'
paths:
  /items:
    get:
      operationId: getItems
      summary: Get items
      security:
        - oauth2_scheme: []
      responses:
        '200':
          description: OK
    post:
      operationId: createItem
      summary: Create item
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    oauth2_scheme:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://example.com/oauth/token
          scopes: {}
