openapi: 3.0.1
info:
  title: Quarkus global scoped security with per-operation overrides
  version: '1.0'
servers:
  - url: 'http://localhost:8080/'
security:
  - oauth2_scheme:
      - admin
paths:
  /items:
    get:
      operationId: getItems
      summary: Overrides global admin with user scope
      security:
        - oauth2_scheme:
            - user
      responses:
        '200':
          description: OK
    post:
      operationId: createItem
      summary: Disables security entirely — no annotation emitted
      security: []
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    oauth2_scheme:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://example.com/oauth/token
          scopes:
            admin: Admin access
            user: User access
