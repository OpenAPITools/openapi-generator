openapi: 3.0.1
info:
  title: Quarkus OpenID Connect no scopes test
  version: '1.0'
servers:
  - url: 'http://localhost:8080/'
paths:
  /items:
    get:
      operationId: getItems
      summary: Get items
      security:
        - oidc_scheme: []
      responses:
        '200':
          description: OK
    post:
      operationId: createItem
      summary: Create item
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    oidc_scheme:
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
