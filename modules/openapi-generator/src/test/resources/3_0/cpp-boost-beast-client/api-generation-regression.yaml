openapi: 3.0.3
info:
  title: C++ Boost Beast API generation regression
  version: 1.0.0
paths:
  /default-only:
    get:
      tags:
        - Regression
      operationId: getDefaultOnly
      responses:
        default:
          description: Typed fallback
          content:
            application/json:
              schema:
                type: integer
                format: int32
  /default-after-explicit:
    get:
      tags:
        - Regression
      operationId: getDefaultAfterExplicit
      responses:
        default:
          description: Incompatible fallback
          content:
            application/json:
              schema:
                type: string
        '200':
          description: Explicit success
          content:
            application/json:
              schema:
                type: integer
                format: int32
  /void-default:
    get:
      tags:
        - Regression
      operationId: getVoidDefault
      responses:
        '200':
          description: Explicit success
          content:
            application/json:
              schema:
                type: integer
                format: int32
        default:
          description: Bodyless fallback
  /empty-map:
    get:
      tags:
        - Regression
      operationId: getEmptyMap
      responses:
        '200':
          description: Map response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
  /empty-free-form:
    get:
      tags:
        - Regression
      operationId: getEmptyFreeForm
      responses:
        '200':
          description: Free-form response
          content:
            application/json:
              schema: {}
  /raw-text:
    post:
      tags:
        - Regression
      operationId: postRawText
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '204':
          description: Accepted
  /raw-binary:
    post:
      tags:
        - Regression
      operationId: postRawBinary
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '204':
          description: Accepted
  /raw-integer:
    post:
      tags:
        - Regression
      operationId: postRawInteger
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: integer
              format: int32
      responses:
        '204':
          description: Accepted
  /raw-boolean:
    post:
      tags:
        - Regression
      operationId: postRawBoolean
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: boolean
      responses:
        '204':
          description: Accepted
  /raw-xml:
    post:
      tags:
        - Regression
      operationId: postRawXml
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
      responses:
        '204':
          description: Accepted
  /structured-text:
    post:
      tags:
        - Regression
      operationId: postStructuredText
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              $ref: '#/components/schemas/Payload'
      responses:
        '204':
          description: Accepted
  /multipart-form:
    post:
      tags:
        - Regression
      operationId: postMultipartForm
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                description:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '204':
          description: Accepted
  /urlencoded-form:
    post:
      tags:
        - Regression
      operationId: postUrlEncodedForm
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                value:
                  type: string
                enabled:
                  type: boolean
      responses:
        '204':
          description: Accepted
  /query-encoding:
    get:
      tags:
        - Regression
      operationId: getQueryEncoding
      parameters:
        - name: wire-name
          in: query
          required: true
          schema:
            type: string
        - name: values
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
        - name: wire-header
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Accepted
components:
  schemas:
    Payload:
      type: object
      required:
        - value
      properties:
        value:
          type: string
