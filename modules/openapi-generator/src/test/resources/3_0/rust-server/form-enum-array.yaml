openapi: "3.0.3"
info:
  title: Form Enum Array Test
  version: "1.0.0"
paths:
  /form-enum-array:
    post:
      operationId: FormEnumArray
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                required_enum_array:
                  type: array
                  items:
                    type: string
                    enum:
                      - value_one
                      - value_two
                optional_enum_array:
                  type: array
                  items:
                    type: string
                    enum:
                      - value_one
                      - value_two
              required:
                - required_enum_array
      responses:
        '200':
          description: OK
