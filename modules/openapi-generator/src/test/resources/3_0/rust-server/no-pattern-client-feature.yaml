openapi: 3.0.3
info:
  title: Rust server no pattern client feature test
  version: 1.0.0
paths:
  /pet:
    get:
      operationId: getPet
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
components:
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
