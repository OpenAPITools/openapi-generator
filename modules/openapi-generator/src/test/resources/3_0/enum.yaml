openapi: 3.0.0
info:
  title: Sample API
  description: API description in Markdown.
  version: 1.0.0
paths:
  /ponies:
    get:
      summary: Returns all animals.
      description: Optional extended description in Markdown.
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pony'
    post:
      summary: To test enum parameters.
      description: To test enum parameters.
      parameters:
        - name: status
          in: query
          description: Status values that need to be considered for filter
          required: true
          style: form
          explode: false
          deprecated: true
          schema:
            type: array
            items:
              type: string
              enum:
                - available
                - pending
                - sold
              default: available
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pony'
components:
  schemas:
    Pony:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
    Type:
      type: string
      enum:
        - Earth
        - Pegasi
        - Unicorn
    IntegerEnum:
      type: integer
      enum:
        - 1
        - 2
        - 4
