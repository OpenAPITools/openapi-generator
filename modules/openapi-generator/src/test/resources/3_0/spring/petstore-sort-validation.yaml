openapi: 3.0.1
info:
  title: OpenAPI Petstore - Sort Validation Test
  description: Test spec for generateSortValidation feature
  version: 1.0.0
servers:
  - url: http://petstore.swagger.io/v2
tags:
  - name: pet
    description: Everything about your Pets
  - name: orders
    description: Order filtering endpoints
paths:
  /pet/findByStatusWithSort:
    get:
      tags:
        - pet
      summary: Find pets with explicit x-spring-paginated and inline sort enum
      operationId: findPetsWithSortEnum
      x-spring-paginated: true
      parameters:
        - name: status
          in: query
          description: Status filter
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort order
          schema:
            type: string
            enum:
              - "id,asc"
              - "id,desc"
              - "name,asc"
              - "name,desc"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findAutoDetectedWithSort:
    get:
      tags:
        - pet
      summary: Find pets with auto-detected pagination and sort enum
      operationId: findPetsAutoDetectedWithSort
      parameters:
        - name: status
          in: query
          description: Status filter
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort order
          schema:
            type: string
            enum:
              - "id,asc"
              - "id,desc"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithRefSort:
    get:
      tags:
        - pet
      summary: Find pets with x-spring-paginated and $ref sort enum
      operationId: findPetsWithRefSort
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort order
          schema:
            $ref: '#/components/schemas/PetSort'
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithoutSortEnum:
    get:
      tags:
        - pet
      summary: Find pets with pagination but sort has no enum constraint
      operationId: findPetsWithoutSortEnum
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort order (no enum constraint)
          schema:
            type: string
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findNonPaginatedWithSortEnum:
    get:
      tags:
        - pet
      summary: Find pets without pagination but sort param has enum — no sort validation expected
      operationId: findPetsNonPaginatedWithSortEnum
      parameters:
        - name: sort
          in: query
          description: Sort order with enum but no pagination
          schema:
            type: string
            enum:
              - "id,asc"
              - "id,desc"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'

  # ---- Pageable defaults test cases ----

  /pet/findWithSortDefaultOnly:
    get:
      tags:
        - pet
      summary: Find pets — sort default only (single field DESC, no page/size defaults)
      operationId: findPetsWithSortDefaultOnly
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: size
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          schema:
            type: string
            default: "name,desc"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithSortDefaultAsc:
    get:
      tags:
        - pet
      summary: Find pets — sort default only (single field, no explicit direction defaults to ASC)
      operationId: findPetsWithSortDefaultAsc
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: size
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          schema:
            type: string
            default: "id"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithMixedSortDefaults:
    get:
      tags:
        - pet
      summary: Find pets — multiple sort defaults with mixed directions (array sort param)
      operationId: findPetsWithMixedSortDefaults
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: size
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            default:
              - "name,desc"
              - "id,asc"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithPageSizeDefaultsOnly:
    get:
      tags:
        - pet
      summary: Find pets — page and size defaults only, no sort default
      operationId: findPetsWithPageSizeDefaultsOnly
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 25
        - name: sort
          in: query
          schema:
            type: string
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithAllDefaults:
    get:
      tags:
        - pet
      summary: Find pets — page, size, and mixed sort defaults all present
      operationId: findPetsWithAllDefaults
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            default:
              - "name,desc"
              - "id,asc"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithSizeConstraint:
    get:
      tags:
        - pet
      summary: Find pets — size has maximum constraint only
      operationId: findPetsWithSizeConstraint
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: size
          in: query
          schema:
            type: integer
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithPageAndSizeConstraint:
    get:
      tags:
        - pet
      summary: Find pets — both page and size have maximum constraints
      operationId: findPetsWithPageAndSizeConstraint
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            maximum: 999
        - name: size
          in: query
          schema:
            type: integer
            maximum: 50
        - name: sort
          in: query
          schema:
            type: string
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithArraySortEnum:
    get:
      tags:
        - pet
      summary: Find pets with x-spring-paginated and array sort param with inline enum on items
      operationId: findPetsWithArraySortEnum
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort order (multi-column, each element must be an allowed value)
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - "id,asc"
                - "id,desc"
                - "name,asc"
                - "name,desc"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithArraySortRefEnum:
    get:
      tags:
        - pet
      summary: Find pets with x-spring-paginated and array sort param whose items use a $ref enum
      operationId: findPetsWithArraySortRefEnum
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort order (multi-column, items $ref to PetSort enum)
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PetSort'
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithExternalParamRefArraySort:
    get:
      tags:
        - pet
      summary: Find pets with x-spring-paginated and sort param referenced from an external components file
      operationId: findPetsWithExternalParamRefArraySort
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - $ref: './petstore-sort-validation-components.yaml#/components/parameters/PetSortParam'
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/findWithNonExplodedExternalParamRefArraySort:
    get:
      tags:
        - pet
      summary: Find pets with x-spring-paginated and non-exploded sort param referenced from an external components file
      operationId: findPetsWithNonExplodedExternalParamRefArraySort
      x-spring-paginated: true
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - $ref: './petstore-sort-validation-components.yaml#/components/parameters/PetSortParamNonExploded'
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  # ---- deepObject model query param test cases ----

  /orders:
    get:
      tags:
        - orders
      summary: List orders filtered by status — tests @ModelAttribute binding for model query params
      operationId: listOrders
      parameters:
        - name: filter
          in: query
          description: Filter by order status (valid Kotlin identifier)
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: order-status
          in: query
          description: Filter by order status (non-Kotlin-identifier wire name, hyphenated)
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: item-status
          in: query
          description: Filter by item status (non-Kotlin-identifier wire name, hyphenated)
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: OK

  /orders/filter-only:
    get:
      tags:
        - orders
      summary: List orders with only the filter param — impl asserts filter is bound correctly
      operationId: listOrdersFilterOnly
      parameters:
        - name: filter
          in: query
          description: Filter by order status (valid Kotlin identifier, isolated test)
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: OK — impl assertion passed

  /orders/order-status-only:
    get:
      tags:
        - orders
      summary: List orders with only the order-status param — impl asserts order-status is bound correctly
      operationId: listOrdersOrderStatusOnly
      parameters:
        - name: order-status
          in: query
          description: Filter by order status (non-Kotlin-identifier wire name, isolated test)
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: OK — impl assertion passed

  /orders/item-status-only:
    get:
      tags:
        - orders
      summary: List orders with only the item-status param — impl asserts item-status is bound correctly
      operationId: listOrdersItemStatusOnly
      parameters:
        - name: item-status
          in: query
          description: Filter by item status (non-Kotlin-identifier wire name, isolated test)
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: OK — impl assertion passed

  # ---- openApiNullable / 4-state required×nullable test cases ----

  /nullable/check-required-only:
    post:
      tags:
        - nullable
      summary: POST with only required fields — impl asserts optional fields are absent/undefined
      operationId: checkRequiredOnly
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NullableModel'
      responses:
        '200':
          description: OK — assertions in impl passed
        '400':
          description: Bad request

  /nullable/check-optional-nullable-null:
    post:
      tags:
        - nullable
      summary: POST with optionalNullable set to null — impl asserts JsonNullable is present-with-null
      operationId: checkOptionalNullableNull
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NullableModel'
      responses:
        '200':
          description: OK — assertions in impl passed
        '400':
          description: Bad request

  /nullable/check-all-present:
    post:
      tags:
        - nullable
      summary: POST with all 4 fields present — impl asserts each field has the expected value
      operationId: checkAllPresent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NullableModel'
      responses:
        '200':
          description: OK — assertions in impl passed
        '400':
          description: Bad request

components:
  schemas:
    NullableModel:
      type: object
      required:
        - requiredNonNullable
        - requiredNullable
      properties:
        # Scenario 1: required=true, nullable=false => strict, non-nullable
        requiredNonNullable:
          type: string
          nullable: false
        # Scenario 2: required=true, nullable=true => required but explicit null allowed
        requiredNullable:
          type: string
          nullable: true
        # Scenario 3: required=false, nullable=false => @JsonSetter(nulls=FAIL) blocks explicit null
        optionalNonNullable:
          type: string
          nullable: false
        # Scenario 4: required=false, nullable=true => JsonNullable<String> (absent/null/value)
        optionalNullable:
          type: string
          nullable: true
    PetSort:
      type: string
      enum:
        - "id,asc"
        - "id,desc"
        - "createdAt,asc"
        - "createdAt,desc"
    OrderStatus:
      type: object
      properties:
        statuses:
          type: array
          uniqueItems: true
          items:
            type: string
    Pet:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          type: string
          description: pet status in the store
