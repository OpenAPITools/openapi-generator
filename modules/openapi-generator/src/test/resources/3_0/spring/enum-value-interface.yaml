openapi: 3.0.0
info:
  title: Enum Value Interface Test
  version: 1.0.0
paths:
  /orders:
    get:
      operationId: listOrders
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
components:
  schemas:
    # Top-level enum schema
    OrderStatus:
      type: string
      enum:
        - placed
        - approved
        - delivered
    # Model with an inline enum property
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        priority:
          type: string
          enum:
            - low
            - medium
            - high
