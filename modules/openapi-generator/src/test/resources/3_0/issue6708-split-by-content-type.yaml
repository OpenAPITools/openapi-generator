openapi: 3.0.1
info:
  title: split operations by content-type (issue 6708)
  version: 1.0.0
paths:
  /reports/{id}:
    get:
      operationId: getReport
      tags:
        - report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
            application/directlog:
              schema:
                type: string
                format: binary
  /reports:
    post:
      operationId: createReport
      tags:
        - report
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Report'
          application/xml:
            schema:
              $ref: '#/components/schemas/ReportXml'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'
            application/pdf:
              schema:
                type: string
                format: binary
components:
  schemas:
    Report:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    ReportXml:
      type: object
      properties:
        ref:
          type: string
    Receipt:
      type: object
      properties:
        number:
          type: string
