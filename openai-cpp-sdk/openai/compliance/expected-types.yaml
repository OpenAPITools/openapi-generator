# Expected C++ types for composed schemas (oneOf / anyOf / allOf).
# Every entry here MUST be a component schema whose ROOT-level defining keyword
# is oneOf, anyOf, or allOf (after skipping description/title/deprecated/example).
# Plain type:object schemas are NOT included — they are checked structurally in
# the inventory member-count analysis instead.
#
# This manifest is enforced by harness.sh: any root-composed schema whose
# emitted C++ type differs from the expectation causes a FAIL in the inventory.
# Conversely, any key in this file that does not correspond to a root-composed
# schema in the spec is a stale entry and should be removed.
#
# Format:
#   schema_name: cpp_type
#
# Use std::variant<...> for oneOf over heterogeneous types,
# std::string / double / bool for anyOf primitive aliases,
# and fully qualified class names for object schemas.

# --- Model IDs (anyOf over string + enum) ---
ModelIdsShared: std::string
ModelIdsResponses: std::string
ModelIds: std::string
ModelIdsCompaction: std::string

# --- Input (oneOf string | array<InputItem>) ---
InputParam: std::variant<std::string, std::vector<InputItem>>

# --- Response model composition ---
CreateResponse: org::openapitools::client::model::CreateResponse
Response: org::openapitools::client::model::Response
ResponseError: org::openapitools::client::model::ResponseError

# --- Content (oneOf over text/image/file/file-ref) ---
