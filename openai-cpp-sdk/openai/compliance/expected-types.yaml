# Expected C++ types for composed schemas (oneOf / anyOf / allOf).
# Each entry maps a schema name to the C++ type the generator should emit.
# This manifest is checked by harness.sh during inventory.
#
# Format:
#   schema_name: cpp_type
#
# Use std::variant<...> for true oneOf, std::optional<T> for nullable properties,
# and primitive aliases (std::string, double, bool) for anyOf aliases.

