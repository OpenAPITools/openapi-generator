    RealtimeResponse:
      type: object
      description: The response resource.
      properties:
        id:
          type: string
          description: The unique ID of the response, will look like `resp_1234`.
        object:
          type: string
          enum:
            - realtime.response
          description: The object type, must be `realtime.response`.
          x-stainless-const: true
        status:
          type: string
          enum:
            - completed
            - cancelled
            - failed
            - incomplete
            - in_progress
          description: >
            The final status of the response (`completed`, `cancelled`,
            `failed`, or 

            `incomplete`, `in_progress`).
        status_details:
          type: object
          description: Additional details about the status.
          properties:
            type:
              type: string
              enum:
                - completed
                - cancelled
                - failed
                - incomplete
              description: >
                The type of error that caused the response to fail,
                corresponding 

                with the `status` field (`completed`, `cancelled`,
                `incomplete`, 

                `failed`).
            reason:
              type: string
              enum:
                - turn_detected
                - client_cancelled
                - max_output_tokens
                - content_filter
              description: >
                The reason the Response did not complete. For a `cancelled`
                Response,  one of `turn_detected` (the server VAD detected a new
                start of speech)  or `client_cancelled` (the client sent a
                cancel event). For an  `incomplete` Response, one of
                `max_output_tokens` or `content_filter`  (the server-side safety
                filter activated and cut off the response).
            error:
              type: object
              description: |
                A description of the error that caused the response to fail, 
                populated when the `status` is `failed`.
              properties:
                type:
                  type: string
                  description: The type of error.
                code:
                  type: string
                  description: Error code, if any.
        output:
          type: array
          description: The list of output items generated by the response.
          items:
            $ref: "#/components/schemas/RealtimeConversationItem"
        metadata:
          $ref: "#/components/schemas/Metadata"
        audio:
          type: object
          description: Configuration for audio output.
          properties:
            output:
              type: object
              properties:
                format:
                  $ref: "#/components/schemas/RealtimeAudioFormats"
                  description: The format of the output audio.
                voice:
                  $ref: "#/components/schemas/VoiceIdsShared"
                  default: alloy
                  description: >
                    The voice the model uses to respond. Voice cannot be changed
                    during the

                    session once the model has responded with audio at least
                    once. Current

                    voice options are `alloy`, `ash`, `ballad`, `coral`, `echo`,
                    `sage`,

                    `shimmer`, `verse`, `marin`, and `cedar`. We recommend
                    `marin` and `cedar` for

                    best quality.
        usage:
          type: object
          description: >
            Usage statistics for the Response, this will correspond to billing.
            A 

            Realtime API session will maintain a conversation context and append
            new 

            Items to the Conversation, thus output from previous turns (text
            and 

            audio tokens) will become the input for later turns.
          properties:
            total_tokens:
              type: integer
              description: >
                The total number of tokens in the Response including input and
                output 

                text and audio tokens.
            input_tokens:
              type: integer
              description: >
                The number of input tokens used in the Response, including text
                and 

                audio tokens.
            output_tokens:
              type: integer
              description: >
                The number of output tokens sent in the Response, including text
                and 

                audio tokens.
            input_token_details:
              type: object
              description: Details about the input tokens used in the Response. Cached tokens
                are tokens from previous turns in the conversation that are
                included as context for the current response. Cached tokens here
                are counted as a subset of input tokens, meaning input tokens
                will include cached and uncached tokens.
              properties:
                cached_tokens:
                  type: integer
                  description: The number of cached tokens used as input for the Response.
                text_tokens:
                  type: integer
                  description: The number of text tokens used as input for the Response.
                image_tokens:
                  type: integer
                  description: The number of image tokens used as input for the Response.
                audio_tokens:
                  type: integer
                  description: The number of audio tokens used as input for the Response.
                cached_tokens_details:
                  type: object
                  description: Details about the cached tokens used as input for the Response.
                  properties:
                    text_tokens:
                      type: integer
                      description: The number of cached text tokens used as input for the Response.
                    image_tokens:
                      type: integer
                      description: The number of cached image tokens used as input for the Response.
                    audio_tokens:
                      type: integer
                      description: The number of cached audio tokens used as input for the Response.
            output_token_details:
              type: object
              description: Details about the output tokens used in the Response.
              properties:
                text_tokens:
                  type: integer
                  description: The number of text tokens used in the Response.
                audio_tokens:
                  type: integer
                  description: The number of audio tokens used in the Response.
        conversation_id:
          description: >
            Which conversation the response is added to, determined by the
            `conversation`

            field in the `response.create` event. If `auto`, the response will
            be added to

            the default conversation and the value of `conversation_id` will be
            an id like

            `conv_1234`. If `none`, the response will not be added to any
            conversation and

            the value of `conversation_id` will be `null`. If responses are
            being triggered

            automatically by VAD the response will be added to the default
            conversation
          type: string
        output_modalities:
          type: array
          description: >
            The set of modalities the model used to respond, currently the only
            possible values are

            `[\"audio\"]`, `[\"text\"]`. Audio output always include a text
            transcript. Setting the

            output to mode `text` will disable audio output from the model.
          items:
            type: string
            enum:
              - text
              - audio
        max_output_tokens:
          oneOf:
            - type: integer
            - type: string
              enum:
                - inf
              x-stainless-const: true
          description: |
            Maximum number of output tokens for a single assistant response,
            inclusive of tool calls, that was used in this response.
    RealtimeResponseCreateParams:
      type: object
      description: Create a new Realtime response with these parameters
      properties:
        output_modalities:
          type: array
          description: >
            The set of modalities the model used to respond, currently the only
            possible values are

            `[\"audio\"]`, `[\"text\"]`. Audio output always include a text
            transcript. Setting the

            output to mode `text` will disable audio output from the model.
          items:
            type: string
            enum:
              - text
              - audio
        instructions:
          type: string
          description: >
            The default system instructions (i.e. system message) prepended to
            model calls. This field allows the client to guide the model on
            desired responses. The model can be instructed on response content
            and format, (e.g. "be extremely succinct", "act friendly", "here are
            examples of good responses") and on audio behavior (e.g. "talk
            quickly", "inject emotion into your voice", "laugh frequently"). The
            instructions are not guaranteed to be followed by the model, but
            they provide guidance to the model on the desired behavior.

            Note that the server sets default instructions which will be used if
            this field is not set and are visible in the `session.created` event
            at the start of the session.
        audio:
          type: object
          description: Configuration for audio input and output.
          properties:
            output:
              type: object
              properties:
                format:
                  $ref: "#/components/schemas/RealtimeAudioFormats"
                  description: The format of the output audio.
                voice:
                  $ref: "#/components/schemas/VoiceIdsOrCustomVoice"
                  default: alloy
                  description: >
                    The voice the model uses to respond. Supported built-in
                    voices are

                    `alloy`, `ash`, `ballad`, `coral`, `echo`, `sage`,
                    `shimmer`, `verse`,

                    `marin`, and `cedar`. You may also provide a custom voice
                    object with

                    an `id`, for example `{ "id": "voice_1234" }`. Voice cannot
                    be changed

                    during the session once the model has responded with audio
                    at least once.

                    We recommend `marin` and `cedar` for best quality.
        tools:
          type: array
          description: Tools available to the model.
          items:
            oneOf:
              - $ref: "#/components/schemas/RealtimeFunctionTool"
              - $ref: "#/components/schemas/MCPTool"
        tool_choice:
          description: >
            How the model chooses tools. Provide one of the string modes or
            force a specific

            function/MCP tool.
          oneOf:
            - $ref: "#/components/schemas/ToolChoiceOptions"
            - $ref: "#/components/schemas/ToolChoiceFunction"
            - $ref: "#/components/schemas/ToolChoiceMCP"
          default: auto
        parallel_tool_calls:
          type: boolean
          description: >
            Whether the model may call multiple tools in parallel. Only
            supported by

            reasoning Realtime models such as `gpt-realtime-2`.
        reasoning:
          $ref: "#/components/schemas/RealtimeReasoning"
        max_output_tokens:
          oneOf:
            - type: integer
            - type: string
              enum:
                - inf
              x-stainless-const: true
          description: |
            Maximum number of output tokens for a single assistant response,
            inclusive of tool calls. Provide an integer between 1 and 4096 to
            limit output tokens, or `inf` for the maximum available tokens for a
            given model. Defaults to `inf`.
        conversation:
          description: >
            Controls which conversation the response is added to. Currently
            supports

            `auto` and `none`, with `auto` as the default value. The `auto`
            value

            means that the contents of the response will be added to the default

            conversation. Set this to `none` to create an out-of-band response
            which

            will not add items to default conversation.
          oneOf:
            - type: string
            - type: string
              default: auto
              enum:
                - auto
                - none
        metadata:
          $ref: "#/components/schemas/Metadata"
        prompt:
          $ref: "#/components/schemas/Prompt"
        input:
          type: array
          description: >
            Input items to include in the prompt for the model. Using this field

            creates a new context for this Response instead of using the default

            conversation. An empty array `[]` will clear the context for this
            Response.

            Note that this can include references to items that previously
            appeared in the session

            using their id.
          items:
            $ref: "#/components/schemas/RealtimeConversationItem"
