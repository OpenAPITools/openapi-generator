    BetaToolsArray:
      type: array
      description: >
        An array of tools the model may call while generating a response. You

        can specify which tool to use by setting the `tool_choice` parameter.


        We support the following categories of tools:

        - **Built-in tools**: Tools that are provided by OpenAI that extend the
          model's capabilities, like [web search](/docs/guides/tools-web-search)
          or [file search](/docs/guides/tools-file-search). Learn more about
          [built-in tools](/docs/guides/tools).
        - **MCP Tools**: Integrations with third-party systems via custom MCP
        servers
          or predefined connectors such as Google Drive and SharePoint. Learn more about
          [MCP Tools](/docs/guides/tools-connectors-mcp).
        - **Function calls (custom tools)**: Functions that are defined by you,
          enabling the model to call your own code with strongly typed arguments
          and outputs. Learn more about
          [function calling](/docs/guides/function-calling). You can also use
          custom tools to call your own code.
      items:
        $ref: "#/components/schemas/BetaTool"
    BetaModelResponseProperties:
      type: object
      properties:
        metadata:
          $ref: "#/components/schemas/BetaMetadata"
        top_logprobs:
          anyOf:
            - description: >
                An integer between 0 and 20 specifying the maximum number of
                most likely

                tokens to return at each token position, each with an associated
                log

                probability. In some cases, the number of returned tokens may be
                fewer than

                requested.
              type: integer
              minimum: 0
              maximum: 20
            - type: "null"
        temperature:
          anyOf:
            - type: number
              minimum: 0
              maximum: 2
              default: 1
              example: 1
              description: >
                What sampling temperature to use, between 0 and 2. Higher values
                like 0.8 will make the output more random, while lower values
                like 0.2 will make it more focused and deterministic.

                We generally recommend altering this or `top_p` but not both.
            - type: "null"
        top_p:
          anyOf:
            - type: number
              minimum: 0
              maximum: 1
              default: 1
              example: 1
              description: >
                An alternative to sampling with temperature, called nucleus
                sampling,

                where the model considers the results of the tokens with top_p
                probability

                mass. So 0.1 means only the tokens comprising the top 10%
                probability mass

                are considered.


                We generally recommend altering this or `temperature` but not
                both.
            - type: "null"
        user:
          type: string
          example: user-1234
          deprecated: true
          description: >
            This field is being replaced by `safety_identifier` and
            `prompt_cache_key`. Use `prompt_cache_key` instead to maintain
            caching optimizations.

            A stable identifier for your end-users.

            Used to boost cache hit rates by better bucketing similar requests
            and  to help OpenAI detect and prevent abuse. [Learn
            more](/docs/guides/safety-best-practices#safety-identifiers).
        safety_identifier:
          type: string
          maxLength: 64
          example: safety-identifier-1234
          description: >
            A stable identifier used to help detect users of your application
            that may be violating OpenAI's usage policies.

            The IDs should be a string that uniquely identifies each user, with
            a maximum length of 64 characters. We recommend hashing their
            username or email address, in order to avoid sending us any
            identifying information. [Learn
            more](/docs/guides/safety-best-practices#safety-identifiers).
        prompt_cache_key:
          type: string
          example: prompt-cache-key-1234
          description: >
            Used by OpenAI to cache responses for similar requests to optimize
            your cache hit rates. Replaces the `user` field. [Learn
            more](/docs/guides/prompt-caching).
        service_tier:
          $ref: "#/components/schemas/BetaServiceTier"
        prompt_cache_retention:
          deprecated: true
          anyOf:
            - type: string
              enum:
                - in_memory
                - 24h
              description: >
                Deprecated. Use `prompt_cache_options.ttl` instead.


                The retention policy for the prompt cache. Set to `24h` to
                enable extended prompt caching, which keeps cached prefixes
                active for longer, up to a maximum of 24 hours. [Learn
                more](/docs/guides/prompt-caching#prompt-cache-retention).

                This field expresses a maximum retention policy, while

                `prompt_cache_options.ttl` expresses a minimum cache lifetime.
                The two

                fields are independent and do not interact.

                For `gpt-5.5`, `gpt-5.5-pro`, and future models, only `24h` is
                supported.


                For older models that support both `in_memory` and `24h`, the
                default depends on your organization's data retention policy:
                  - Organizations without ZDR enabled default to `24h`.
                  - Organizations with ZDR enabled default to `in_memory` when `prompt_cache_retention` is not specified.
            - type: "null"
    BetaServiceTier:
      anyOf:
        - type: string
          description: >
            Specifies the processing type used for serving the request.
              - If set to 'auto', then the request will be processed with the service tier configured in the Project settings. Unless otherwise configured, the Project will use 'default'.
              - If set to 'default', then the request will be processed with the standard pricing and performance for the selected model.
              - If set to '[flex](/docs/guides/flex-processing)' or '[priority](https://openai.com/api-priority-processing/)', then the request will be processed with the corresponding service tier.
              - When not set, the default behavior is 'auto'.

              When the `service_tier` parameter is set, the response body will include the `service_tier` value based on the processing mode actually used to serve the request. This response value may be different from the value set in the parameter.
          enum:
            - auto
            - default
            - flex
            - scale
            - priority
          default: auto
        - type: "null"
