                {
                  "index": 0,
                  "type": "text",
                  "text": { "value": "Hello", "annotations": [] }
                }
              ]
            }
          }
    MessageObject:
      type: object
      title: The message object
      description: Represents a message within a [thread](/docs/api-reference/threads).
      properties:
        id:
          description: The identifier, which can be referenced in API endpoints.
          type: string
        object:
          description: The object type, which is always `thread.message`.
          type: string
          enum:
            - thread.message
          x-stainless-const: true
        created_at:
          description: The Unix timestamp (in seconds) for when the message was created.
          type: integer
          format: unixtime
        thread_id:
          description: The [thread](/docs/api-reference/threads) ID that this message
            belongs to.
          type: string
        status:
          description: The status of the message, which can be either `in_progress`,
            `incomplete`, or `completed`.
          type: string
          enum:
            - in_progress
            - incomplete
            - completed
        incomplete_details:
          anyOf:
            - description: On an incomplete message, details about why the message is
                incomplete.
              type: object
              properties:
                reason:
                  type: string
                  description: The reason the message is incomplete.
                  enum:
                    - content_filter
                    - max_tokens
                    - run_cancelled
                    - run_expired
                    - run_failed
              required:
                - reason
            - type: "null"
        completed_at:
          anyOf:
            - description: The Unix timestamp (in seconds) for when the message was completed.
              type: integer
              format: unixtime
            - type: "null"
        incomplete_at:
          anyOf:
            - description: The Unix timestamp (in seconds) for when the message was marked as
                incomplete.
              type: integer
              format: unixtime
            - type: "null"
        role:
          description: The entity that produced the message. One of `user` or `assistant`.
          type: string
          enum:
            - user
            - assistant
        content:
          description: The content of the message in array of text and/or images.
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/MessageContentImageFileObject"
              - $ref: "#/components/schemas/MessageContentImageUrlObject"
              - $ref: "#/components/schemas/MessageContentTextObject"
              - $ref: "#/components/schemas/MessageContentRefusalObject"
        assistant_id:
          anyOf:
            - description: If applicable, the ID of the
                [assistant](/docs/api-reference/assistants) that authored this
                message.
              type: string
            - type: "null"
        run_id:
          anyOf:
            - description: The ID of the [run](/docs/api-reference/runs) associated with the
                creation of this message. Value is `null` when messages are
