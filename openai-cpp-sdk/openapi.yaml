        - audio_end_ms
        - item_id
      x-oaiMeta:
        name: input_audio_buffer.speech_stopped
        group: realtime
        example: |
          {
              "event_id": "event_1718",
              "type": "input_audio_buffer.speech_stopped",
              "audio_end_ms": 2000,
              "item_id": "msg_003"
          }
    RealtimeServerEventInputAudioBufferTimeoutTriggered:
      type: object
      description: >
        Returned when the Server VAD timeout is triggered for the input audio
        buffer. This is configured

        with `idle_timeout_ms` in the `turn_detection` settings of the session,
        and it indicates that

        there hasn't been any speech detected for the configured duration.


        The `audio_start_ms` and `audio_end_ms` fields indicate the segment of
        audio after the last

        model response up to the triggering time, as an offset from the
        beginning of audio written

        to the input audio buffer. This means it demarcates the segment of audio
        that was silent and

        the difference between the start and end values will roughly match the
        configured timeout.


        The empty audio will be committed to the conversation as an
        `input_audio` item (there will be a

        `input_audio_buffer.committed` event) and a model response will be
        generated. There may be speech

        that didn't trigger VAD but is still detected by the model, so the model
        may respond with

        something relevant to the conversation or a prompt to continue speaking.
      properties:
        event_id:
          type: string
          description: The unique ID of the server event.
        type:
          type: string
          enum:
            - input_audio_buffer.timeout_triggered
          description: The event type, must be `input_audio_buffer.timeout_triggered`.
          x-stainless-const: true
        audio_start_ms:
          type: integer
          description: Millisecond offset of audio written to the input audio buffer that
            was after the playback time of the last model response.
        audio_end_ms:
          type: integer
          description: Millisecond offset of audio written to the input audio buffer at
            the time the timeout was triggered.
        item_id:
          type: string
          description: The ID of the item associated with this segment.
      required:
        - event_id
        - type
        - audio_start_ms
        - audio_end_ms
        - item_id
      x-oaiMeta:
        name: input_audio_buffer.timeout_triggered
        group: realtime
        example: |
          {
              "type":"input_audio_buffer.timeout_triggered",
              "event_id":"event_CEKKrf1KTGvemCPyiJTJ2",
              "audio_start_ms":13216,
              "audio_end_ms":19232,
              "item_id":"item_CEKKrWH0GiwN0ET97NUZc"
          }
