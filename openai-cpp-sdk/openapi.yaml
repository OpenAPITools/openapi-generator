              schema:
                $ref: "#/components/schemas/ImagesResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ImageGenStreamEvent"
      x-oaiMeta:
        name: Create image
        group: images
        examples:
          - title: Generate image
            request:
              curl: |
                curl https://api.openai.com/v1/images/generations \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -d '{
                    "model": "gpt-image-1.5",
                    "prompt": "A cute baby sea otter",
                    "n": 1,
                    "size": "1024x1024"
                  }'
              python: |
                import base64
                from openai import OpenAI
                client = OpenAI()

                img = client.images.generate(
                    model="gpt-image-1.5",
                    prompt="A cute baby sea otter",
                    n=1,
                    size="1024x1024"
                )

                image_bytes = base64.b64decode(img.data[0].b64_json)
                with open("output.png", "wb") as f:
                    f.write(image_bytes)
              javascript: |
                import OpenAI from "openai";
                import { writeFile } from "fs/promises";

                const client = new OpenAI();

                const img = await client.images.generate({
                  model: "gpt-image-1.5",
                  prompt: "A cute baby sea otter",
                  n: 1,
                  size: "1024x1024"
                });

                const imageBuffer = Buffer.from(img.data[0].b64_json, "base64");
                await writeFile("output.png", imageBuffer);
            response: |
              {
                "created": 1713833628,
                "data": [
                  {
                    "b64_json": "..."
                  }
                ],
                "usage": {
                  "total_tokens": 100,
                  "input_tokens": 50,
                  "output_tokens": 50,
                  "input_tokens_details": {
                    "text_tokens": 10,
                    "image_tokens": 40
                  }
                }
              }
          - title: Streaming
            request:
              curl: |
                curl https://api.openai.com/v1/images/generations \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -d '{
                    "model": "gpt-image-1.5",
                    "prompt": "A cute baby sea otter",
                    "n": 1,
                    "size": "1024x1024",
                    "stream": true
                  }' \
                  --no-buffer
              python: |
                from openai import OpenAI

                client = OpenAI()

                stream = client.images.generate(
                    model="gpt-image-1.5",
                    prompt="A cute baby sea otter",
                    n=1,
                    size="1024x1024",
                    stream=True
                )

                for event in stream:
                    print(event)
              javascript: |
                import OpenAI from "openai";

                const client = new OpenAI();

                const stream = await client.images.generate({
                  model: "gpt-image-1.5",
                  prompt: "A cute baby sea otter",
                  n: 1,
                  size: "1024x1024",
                  stream: true,
                });

                for await (const event of stream) {
                  console.log(event);
                }
            response: |
              event: image_generation.partial_image
              data: {"type":"image_generation.partial_image","b64_json":"...","partial_image_index":0}

              event: image_generation.completed
              data: {"type":"image_generation.completed","b64_json":"...","usage":{"total_tokens":100,"input_tokens":50,"output_tokens":50,"input_tokens_details":{"text_tokens":10,"image_tokens":40}}}
