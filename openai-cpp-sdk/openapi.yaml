              description: |
                The name of the tool to call on the server.
            - type: "null"
      required:
        - type
        - server_label
    ToolChoiceOptions:
      type: string
      title: Tool choice mode
      description: >
        Controls which (if any) tool is called by the model.


        `none` means the model will not call any tool and instead generates a
        message.


        `auto` means the model can pick between generating a message or calling
        one or

        more tools.


        `required` means the model must call one or more tools.
      enum:
        - none
        - auto
        - required
    ToolChoiceParam:
      description: |
        How the model should select which tool (or tools) to use when generating
        a response. See the `tools` parameter to see how to specify which tools
        the model can call.
      oneOf:
        - $ref: "#/components/schemas/ToolChoiceOptions"
        - $ref: "#/components/schemas/ToolChoiceAllowed"
        - $ref: "#/components/schemas/ToolChoiceTypes"
        - $ref: "#/components/schemas/ToolChoiceFunction"
        - $ref: "#/components/schemas/ToolChoiceMCP"
        - $ref: "#/components/schemas/ToolChoiceCustom"
        - $ref: "#/components/schemas/SpecificProgrammaticToolCallingParam"
        - $ref: "#/components/schemas/SpecificApplyPatchParam"
        - $ref: "#/components/schemas/SpecificFunctionShellParam"
    ToolChoiceTypes:
      type: object
      title: Hosted tool
      description: >
        Indicates that the model should use a built-in tool to generate a
        response.

        [Learn more about built-in tools](/docs/guides/tools).
      properties:
        type:
          type: string
          description: |
            The type of hosted tool the model should to use. Learn more about
            [built-in tools](/docs/guides/tools).

            Allowed values are:
            - `file_search`
            - `web_search_preview`
            - `computer`
            - `computer_use_preview`
            - `computer_use`
            - `code_interpreter`
            - `image_generation`
          enum:
            - file_search
            - web_search_preview
            - computer
            - computer_use_preview
            - computer_use
            - web_search_preview_2025_03_11
            - image_generation
            - code_interpreter
      required:
        - type
    ToolsArray:
      type: array
      description: >
        An array of tools the model may call while generating a response. You

        can specify which tool to use by setting the `tool_choice` parameter.


        We support the following categories of tools:

        - **Built-in tools**: Tools that are provided by OpenAI that extend the
          model's capabilities, like [web search](/docs/guides/tools-web-search)
          or [file search](/docs/guides/tools-file-search). Learn more about
          [built-in tools](/docs/guides/tools).
        - **MCP Tools**: Integrations with third-party systems via custom MCP
        servers
          or predefined connectors such as Google Drive and SharePoint. Learn more about
          [MCP Tools](/docs/guides/tools-connectors-mcp).
        - **Function calls (custom tools)**: Functions that are defined by you,
          enabling the model to call your own code with strongly typed arguments
          and outputs. Learn more about
          [function calling](/docs/guides/function-calling). You can also use
          custom tools to call your own code.
      items:
        $ref: "#/components/schemas/Tool"
    TranscriptTextDeltaEvent:
