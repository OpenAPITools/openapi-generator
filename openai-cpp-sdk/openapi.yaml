    AssistantsApiResponseFormatOption:
      description: >
        Specifies the format that the model must output. Compatible with
        [GPT-4o](/docs/models#gpt-4o), [GPT-4
        Turbo](/docs/models#gpt-4-turbo-and-gpt-4), and all GPT-3.5 Turbo models
        since `gpt-3.5-turbo-1106`.


        Setting to `{ "type": "json_schema", "json_schema": {...} }` enables
        Structured Outputs which ensures the model will match your supplied JSON
        schema. Learn more in the [Structured Outputs
        guide](/docs/guides/structured-outputs).


        Setting to `{ "type": "json_object" }` enables JSON mode, which ensures
        the message the model generates is valid JSON.


        **Important:** when using JSON mode, you **must** also instruct the
        model to produce JSON yourself via a system or user message. Without
        this, the model may generate an unending stream of whitespace until the
        generation reaches the token limit, resulting in a long-running and
        seemingly "stuck" request. Also note that the message content may be
        partially cut off if `finish_reason="length"`, which indicates the
        generation exceeded `max_tokens` or the conversation exceeded the max
        context length.
      oneOf:
        - type: string
          description: |
            `auto` is the default value
          enum:
            - auto
          x-stainless-const: true
        - $ref: "#/components/schemas/ResponseFormatText"
        - $ref: "#/components/schemas/ResponseFormatJsonObject"
        - $ref: "#/components/schemas/ResponseFormatJsonSchema"
    AssistantsApiToolChoiceOption:
      description: >
        Controls which (if any) tool is called by the model.

        `none` means the model will not call any tools and instead generates a
        message.

        `auto` is the default value and means the model can pick between
        generating a message or calling one or more tools.

        `required` means the model must call one or more tools before responding
        to the user.

        Specifying a particular tool like `{"type": "file_search"}` or `{"type":
        "function", "function": {"name": "my_function"}}` forces the model to
        call that tool.
      oneOf:
        - type: string
          description: >
            `none` means the model will not call any tools and instead generates
            a message. `auto` means the model can pick between generating a
            message or calling one or more tools. `required` means the model
            must call one or more tools before responding to the user.
          enum:
            - none
            - auto
            - required
        - $ref: "#/components/schemas/AssistantsNamedToolChoice"
    AssistantsNamedToolChoice:
      type: object
      description: Specifies a tool the model should use. Use to force the model to
        call a specific tool.
      properties:
        type:
          type: string
          enum:
            - function
            - code_interpreter
            - file_search
          description: The type of the tool. If type is `function`, the function name must
            be set
        function:
          type: object
          properties:
            name:
              type: string
              description: The name of the function to call.
          required:
            - name
      required:
        - type
    AudioResponseFormat:
      description: >
        The format of the output, in one of these options: `json`, `text`,
        `srt`, `verbose_json`, `vtt`, or `diarized_json`. For
        `gpt-4o-transcribe` and `gpt-4o-mini-transcribe`, the only supported
        format is `json`. For `gpt-4o-transcribe-diarize`, the supported formats
        are `json`, `text`, and `diarized_json`, with `diarized_json` required
        to receive speaker annotations.
      type: string
      enum:
        - json
        - text
        - srt
        - verbose_json
        - vtt
        - diarized_json
      default: json
    AudioTranscription:
      type: object
      properties:
        model:
          description: >
            The model to use for transcription. Current options are `whisper-1`,
            `gpt-4o-mini-transcribe`, `gpt-4o-mini-transcribe-2025-12-15`,
            `gpt-4o-transcribe`, `gpt-4o-transcribe-diarize`, and
            `gpt-realtime-whisper`. Use `gpt-4o-transcribe-diarize` when you
            need diarization with speaker labels.
          anyOf:
            - type: string
            - type: string
              enum:
                - whisper-1
                - gpt-4o-mini-transcribe
                - gpt-4o-mini-transcribe-2025-12-15
                - gpt-4o-transcribe
                - gpt-4o-transcribe-diarize
                - gpt-realtime-whisper
        language:
          type: string
          description: >
            The language of the input audio. Supplying the input language in

            [ISO-639-1](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)
            (e.g. `en`) format

            will improve accuracy and latency.
        prompt:
          type: string
          description: >
            An optional text to guide the model's style or continue a previous
            audio

            segment.

            For `whisper-1`, the [prompt is a list of
            keywords](/docs/guides/speech-to-text#prompting).

            For `gpt-4o-transcribe` models (excluding
            `gpt-4o-transcribe-diarize`), the prompt is a free text string, for
            example "expect words related to technology".

            Prompt is not supported with `gpt-realtime-whisper` in GA Realtime
            sessions.
        delay:
          type: string
          description: >
            Controls how long the model waits before emitting transcription
            text.

            Higher values can improve transcription accuracy at the cost of
            latency.

            Only supported with `gpt-realtime-whisper` in GA Realtime sessions.
          enum:
            - minimal
            - low
            - medium
            - high
            - xhigh
    AudioTranscriptionResponse:
      type: object
      properties:
        model:
          description: >
            The model used for transcription. Current options are `whisper-1`,
            `gpt-4o-mini-transcribe`, `gpt-4o-mini-transcribe-2025-12-15`,
            `gpt-4o-transcribe`, `gpt-4o-transcribe-diarize`, and
            `gpt-realtime-whisper`.
          anyOf:
            - type: string
            - type: string
              enum:
                - whisper-1
                - gpt-4o-mini-transcribe
                - gpt-4o-mini-transcribe-2025-12-15
                - gpt-4o-transcribe
                - gpt-4o-transcribe-diarize
                - gpt-realtime-whisper
        language:
          type: string
          description: |
            The language of the input audio.
        prompt:
          type: string
          description: |
            The prompt configured for input audio transcription, when present.
