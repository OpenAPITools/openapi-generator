        - `stream` is implicit over WebSocket and should not be sent.

        - `background` is not supported over WebSocket.
      x-oaiMeta:
        example: |
          {
            "type": "response.create",
            "model": "gpt-5.5",
            "input": "Say hello."
          }
    BetaCreateResponse:
      allOf:
        - $ref: "#/components/schemas/BetaCreateModelResponseProperties"
        - $ref: "#/components/schemas/BetaResponseProperties"
        - type: object
          properties:
            truncation:
              deprecated: true
              anyOf:
                - type: string
                  description: >
                    The truncation strategy to use for the model response.

                    - `auto`: If the input to this Response exceeds
                      the model's context window size, the model will truncate the
                      response to fit the context window by dropping items from the beginning of the conversation.
                    - `disabled` (default): If the input size will exceed the
                    context window
                      size for a model, the request will fail with a 400 error.
                  enum:
                    - auto
                    - disabled
                  default: disabled
                - type: "null"
            reasoning:
              anyOf:
                - $ref: "#/components/schemas/BetaReasoning"
                - type: "null"
            input:
              $ref: "#/components/schemas/BetaInputParam"
            include:
              anyOf:
                - type: array
                  description: >-
                    Specify additional output data to include in the model
                    response. Currently supported values are:

                    - `web_search_call.action.sources`: Include the sources of
                    the web search tool call.

                    - `code_interpreter_call.outputs`: Includes the outputs of
                    python code execution in code interpreter tool call items.

                    - `computer_call_output.output.image_url`: Include image
                    urls from the computer call output.

                    - `file_search_call.results`: Include the search results of
                    the file search tool call.

                    - `message.input_image.image_url`: Include image urls from
                    the input message.

                    - `message.output_text.logprobs`: Include logprobs with
                    assistant messages.

                    - `reasoning.encrypted_content`: Includes an encrypted
                    version of reasoning tokens in reasoning item outputs. This
                    enables reasoning items to be used in multi-turn
                    conversations when using the Responses API statelessly (like
                    when the `store` parameter is set to `false`, or when an
                    organization is enrolled in the zero data retention
                    program).
                  items:
                    $ref: "#/components/schemas/BetaIncludeEnum"
                - type: "null"
            parallel_tool_calls:
              anyOf:
                - type: boolean
                  description: |
                    Whether to allow the model to run tool calls in parallel.
                  default: true
                - type: "null"
            store:
              anyOf:
                - type: boolean
                  description: >
                    Whether to store the generated model response for later
                    retrieval via

                    API.
                  default: true
                - type: "null"
            instructions:
              anyOf:
                - type: string
                  description: >
                    A system (or developer) message inserted into the model's
                    context.


                    When using along with `previous_response_id`, the
                    instructions from a previous

                    response will not be carried over to the next response. This
                    makes it simple

                    to swap out system (or developer) messages in new responses.
                - type: "null"
            moderation:
              anyOf:
                - $ref: "#/components/schemas/BetaModerationParam"
                  description: >
                    Configuration for running moderation on the input and output
                    of this response.
                - type: "null"
            stream:
              anyOf:
                - description: |
                    If set to true, the model response data will be streamed to the client
                    as it is generated using [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#Event_stream_format).
                    See the [Streaming section below](/docs/api-reference/responses-streaming)
                    for more information.
                  type: boolean
                  default: false
                - type: "null"
            stream_options:
              $ref: "#/components/schemas/BetaResponseStreamOptions"
            conversation:
              anyOf:
                - $ref: "#/components/schemas/BetaConversationParam"
                - type: "null"
            context_management:
              anyOf:
                - type: array
                  description: |
                    Context management configuration for this request.
                  minItems: 1
                  items:
                    $ref: "#/components/schemas/BetaContextManagementParam"
                - type: "null"
            max_output_tokens:
              anyOf:
                - description: >
                    An upper bound for the number of tokens that can be
                    generated for a response, including visible output tokens
                    and [reasoning tokens](/docs/guides/reasoning).
                  type: integer
                  minimum: 16
                - type: "null"
            multi_agent:
              anyOf:
                - $ref: "#/components/schemas/BetaMultiAgentParam"
                  description: Configuration for server-hosted multi-agent execution.
                - type: "null"
    BetaMultiAgentParam:
      properties:
        enabled:
          type: boolean
          description: Whether to enable server-hosted multi-agent execution for this
            response.
        max_concurrent_subagents:
          type: integer
          minimum: 1
          description: >-
            `max_concurrent_subagents` sets the maximum number of subagents that
            can be active simultaneously across the entire agent tree. It
            includes all descendants—children, grandchildren, and deeper
            subagents—but excludes the root agent.

            The API does not impose a fixed upper bound on this setting. The
            default is `3`, which is recommended for most workloads. Multi-agent
            runs also have no fixed limit on tree depth or the total number of
            subagents created during a run.
      type: object
      required:
        - enabled
      description: Configuration for server-hosted multi-agent execution.
      x-oai-beta: responses_multi_agent=v1
    BetaContextManagementParam:
      properties:
        type:
          type: string
          description: The context management entry type. Currently only 'compaction' is
            supported.
        compact_threshold:
          anyOf:
            - type: integer
              minimum: 1000
              description: Token threshold at which compaction should be triggered for this
                entry.
            - type: "null"
      type: object
      required:
        - type
    BetaResponseStreamOptions:
      anyOf:
        - description: >
            Options for streaming responses. Only set this when you set `stream:
            true`.
          type: object
          default: null
          properties:
            include_obfuscation:
              type: boolean
              description: >
                When true, stream obfuscation will be enabled. Stream
                obfuscation adds

                random characters to an `obfuscation` field on streaming delta
                events to

                normalize payload sizes as a mitigation to certain side-channel
                attacks.

                These obfuscation fields are included by default, but add a
                small amount

                of overhead to the data stream. You can set
                `include_obfuscation` to

                false to optimize for bandwidth if you trust the network links
                between

                your application and the OpenAI API.
        - type: "null"
    BetaModerationParam:
      properties:
        model:
          type: string
          description: The moderation model to use for moderated completions, e.g.
            'omni-moderation-latest'.
        policy:
          anyOf:
            - $ref: "#/components/schemas/BetaModerationPolicyParam"
              description: The policy to apply to moderated response input and output.
            - type: "null"
      type: object
      required:
        - model
      description: Configuration for running moderation on the input and output of
        this response.
    BetaModerationPolicyParam:
      properties:
        input:
          anyOf:
            - $ref: "#/components/schemas/BetaModerationConfigParam"
              description: The moderation policy for the response input.
            - type: "null"
        output:
          anyOf:
            - $ref: "#/components/schemas/BetaModerationConfigParam"
              description: The moderation policy for the response output.
            - type: "null"
      type: object
      required: []
      description: The policy to apply to moderated response input and output.
    BetaModerationConfigParam:
      properties:
        mode:
          $ref: "#/components/schemas/BetaModerationMode"
      type: object
      required:
        - mode
      description: The moderation policy for the response input.
    BetaModerationMode:
      type: string
      enum:
        - score
        - block
    BetaCreateModelResponseProperties:
      allOf:
        - $ref: "#/components/schemas/BetaModelResponseProperties"
        - type: object
          properties:
            prompt_cache_options:
              $ref: "#/components/schemas/BetaPromptCacheOptionsParam"
            top_logprobs:
              description: >
                An integer between 0 and 20 specifying the maximum number of
                most likely

                tokens to return at each token position, each with an associated
                log

                probability. In some cases, the number of returned tokens may be
                fewer than

                requested.
              type: integer
              minimum: 0
              maximum: 20
