        - tools
    ToolChoiceCustom:
      type: object
      title: Custom tool
      description: |
        Use this option to force the model to call a specific custom tool.
      properties:
        type:
          type: string
          enum:
            - custom
          description: For custom tool calling, the type is always `custom`.
          x-stainless-const: true
        name:
          type: string
          description: The name of the custom tool to call.
      required:
        - type
        - name
    ToolChoiceFunction:
      type: object
      title: Function tool
      description: |
        Use this option to force the model to call a specific function.
      properties:
        type:
          type: string
          enum:
            - function
          description: For function calling, the type is always `function`.
          x-stainless-const: true
        name:
          type: string
          description: The name of the function to call.
      required:
        - type
        - name
    ToolChoiceMCP:
      type: object
      title: MCP tool
      description: >
        Use this option to force the model to call a specific tool on a remote
        MCP server.
      properties:
        type:
          type: string
          enum:
            - mcp
          description: For MCP tools, the type is always `mcp`.
          x-stainless-const: true
        server_label:
          type: string
          description: |
            The label of the MCP server to use.
        name:
          anyOf:
