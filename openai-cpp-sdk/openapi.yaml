        sdp:
          type: string
          description: WebRTC Session Description Protocol (SDP) offer generated by the
            caller.
        session:
          title: Session configuration
          allOf:
            - $ref: "#/components/schemas/RealtimeSessionCreateRequestGA"
          description: |-
            Optional session configuration to apply before the realtime session is
            created. Use the same parameters you would send in a [`create client secret`](/docs/api-reference/realtime-sessions/create-realtime-client-secret)
            request.
      additionalProperties: false
    RealtimeCallReferRequest:
      title: Realtime call refer request
      type: object
      description: >-
        Parameters required to transfer a SIP call to a new destination using
        the

        Realtime API.
      required:
        - target_uri
      properties:
        target_uri:
          type: string
          description: >-
            URI that should appear in the SIP Refer-To header. Supports values
            like

            `tel:+14155550123` or `sip:agent@example.com`.
          example: tel:+14155550123
      additionalProperties: false
    RealtimeCallRejectRequest:
      title: Realtime call reject request
      type: object
      description: Parameters used to decline an incoming SIP call handled by the
        Realtime API.
      properties:
        status_code:
          type: integer
          description: >-
            SIP response code to send back to the caller. Defaults to `603`
            (Decline)

            when omitted.
          example: 486
