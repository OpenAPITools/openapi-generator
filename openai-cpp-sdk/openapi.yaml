  /realtime/client_secrets:
    post:
      summary: >
        Create a Realtime client secret with an associated session
        configuration.


        Client secrets are short-lived tokens that can be passed to a client
        app,

        such as a web frontend or mobile client, which grants access to the
        Realtime API without

        leaking your main API key. You can configure a custom TTL for each
        client secret.


        You can also attach session configuration options to the client secret,
        which will be

        applied to any sessions created using that client secret, but these can
        also be overridden

        by the client connection.


        [Learn more about authentication with client secrets over
        WebRTC](/docs/guides/realtime-webrtc).


        Returns the created client secret and the effective session object. The
        client secret is a string that looks like `ek_1234`.
      operationId: create-realtime-client-secret
      tags:
        - Realtime
      requestBody:
        description: Create a client secret with the given session configuration.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RealtimeCreateClientSecretRequest"
      responses:
        "200":
          description: Client secret created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeCreateClientSecretResponse"
      x-oaiMeta:
        name: Create client secret
        group: realtime
        examples:
          request:
            curl: |
              curl -X POST https://api.openai.com/v1/realtime/client_secrets \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{
                  "expires_after": {
                    "anchor": "created_at",
                    "seconds": 600
                  },
                  "session": {
                    "type": "realtime",
                    "model": "gpt-realtime",
                    "instructions": "You are a friendly assistant."
                  }
                }'
          response: |
            {
              "value": "ek_68af296e8e408191a1120ab6383263c2",
              "expires_at": 1756310470,
              "session": {
                "type": "realtime",
                "object": "realtime.session",
                "id": "sess_C9CiUVUzUzYIssh3ELY1d",
                "model": "gpt-realtime",
                "output_modalities": [
                  "audio"
                ],
                "instructions": "You are a friendly assistant.",
                "tools": [],
