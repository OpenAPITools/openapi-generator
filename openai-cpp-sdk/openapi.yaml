    MCPTool:
      type: object
      title: MCP tool
      description: >
        Give the model access to additional tools via remote Model Context
        Protocol

        (MCP) servers. [Learn more about MCP](/docs/guides/tools-remote-mcp).
      properties:
        type:
          type: string
          enum:
            - mcp
          description: The type of the MCP tool. Always `mcp`.
          x-stainless-const: true
        server_label:
          type: string
          description: |
            A label for this MCP server, used to identify it in tool calls.
        server_url:
          type: string
          format: uri
          description: |
            The URL for the MCP server. One of `server_url`, `connector_id`, or
            `tunnel_id` must be provided.
        connector_id:
          type: string
          enum:
            - connector_dropbox
            - connector_gmail
            - connector_googlecalendar
            - connector_googledrive
            - connector_microsoftteams
            - connector_outlookcalendar
            - connector_outlookemail
            - connector_sharepoint
          description: >
            Identifier for service connectors, like those available in ChatGPT.
            One of

            `server_url`, `connector_id`, or `tunnel_id` must be provided. Learn
            more

            about service connectors
            [here](/docs/guides/tools-remote-mcp#connectors).


            Currently supported `connector_id` values are:


            - Dropbox: `connector_dropbox`

            - Gmail: `connector_gmail`

            - Google Calendar: `connector_googlecalendar`

            - Google Drive: `connector_googledrive`

            - Microsoft Teams: `connector_microsoftteams`

            - Outlook Calendar: `connector_outlookcalendar`

            - Outlook Email: `connector_outlookemail`

            - SharePoint: `connector_sharepoint`
        tunnel_id:
          type: string
          pattern: ^tunnel_[a-z0-9]{32}$
          description: >
            The Secure MCP Tunnel ID to use instead of a direct server URL. One
            of

            `server_url`, `connector_id`, or `tunnel_id` must be provided.
        authorization:
          type: string
          description: >
            An OAuth access token that can be used with a remote MCP server,
            either

            with a custom MCP server URL or a service connector. Your
            application

            must handle the OAuth authorization flow and provide the token here.
        server_description:
          type: string
          description: >
            Optional description of the MCP server, used to provide more context.
        headers:
          anyOf:
            - type: object
              additionalProperties:
                type: string
              description: >
                Optional HTTP headers to send to the MCP server. Use for
                authentication

                or other purposes.
            - type: "null"
        allowed_tools:
          anyOf:
            - description: |
                List of allowed tool names or a filter object.
              oneOf:
                - type: array
                  title: MCP allowed tools
                  description: A string array of allowed tool names
                  items:
                    type: string
                - $ref: "#/components/schemas/MCPToolFilter"
            - type: "null"
        allowed_callers:
          anyOf:
            - type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/CallableToolAllowedCaller"
              description: The tool invocation context(s).
            - type: "null"
        require_approval:
          anyOf:
            - description: Specify which of the MCP server's tools require approval.
              oneOf:
                - type: object
                  title: MCP tool approval filter
                  description: >
                    Specify which of the MCP server's tools require approval.
                    Can be

                    `always`, `never`, or a filter object associated with tools

                    that require approval.
                  properties:
                    always:
                      $ref: "#/components/schemas/MCPToolFilter"
                    never:
                      $ref: "#/components/schemas/MCPToolFilter"
                  additionalProperties: false
                - type: string
                  title: MCP tool approval setting
                  description: >
                    Specify a single approval policy for all tools. One of
                    `always` or

                    `never`. When set to `always`, all tools will require
                    approval. When

                    set to `never`, all tools will not require approval.
                  enum:
                    - always
                    - never
              default: always
