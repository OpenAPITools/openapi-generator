  /realtime/calls:
    post:
      summary: >-
        Create a new Realtime API call over WebRTC and receive the SDP answer
        needed

        to complete the peer connection.
      operationId: create-realtime-call
      tags:
        - Realtime
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RealtimeCallCreateRequest"
            encoding:
              sdp:
                contentType: application/sdp
              session:
                contentType: application/json
          application/sdp:
            schema:
              type: string
              description: >-
                WebRTC SDP offer. Use this variant when you have previously
                created an

                ephemeral **session token** and are authenticating the request
                with it.

                Realtime session parameters will be retrieved from the session
                token.
      responses:
        "201":
          description: Realtime call created successfully.
          headers:
            Location:
              description: Relative URL containing the call ID for subsequent control
                requests.
              schema:
                type: string
          content:
            application/sdp:
              schema:
                type: string
                description: SDP answer produced by OpenAI for the peer connection.
      x-oaiMeta:
        name: Create call
        group: realtime
        returns: >-
          Returns `201 Created` with the SDP answer in the response body. The

          `Location` response header includes the call ID for follow-up
          requests,

          e.g., establishing a monitoring WebSocket or hanging up the call.
        examples:
          request:
            curl: >-
              curl -X POST https://api.openai.com/v1/realtime/calls \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -F "sdp=<offer.sdp;type=application/sdp" \
                -F 'session={"type":"realtime","model":"gpt-realtime"};type=application/json'
          response: |-
            v=0
            o=- 4227147428 1719357865 IN IP4 127.0.0.1
            s=-
            c=IN IP4 0.0.0.0
            t=0 0
            a=group:BUNDLE 0 1
            a=msid-semantic:WMS *
            a=fingerprint:sha-256 CA:92:52:51:B4:91:3B:34:DD:9C:0B:FB:76:19:7E:3B:F1:21:0F:32:2C:38:01:72:5D:3F:78:C7:5F:8B:C7:36
            m=audio 9 UDP/TLS/RTP/SAVPF 111 0 8
            a=mid:0
            a=ice-ufrag:kZ2qkHXX/u11
            a=ice-pwd:uoD16Di5OGx3VbqgA3ymjEQV2kwiOjw6
            a=setup:active
            a=rtcp-mux
            a=rtpmap:111 opus/48000/2
            a=candidate:993865896 1 udp 2130706431 4.155.146.196 3478 typ host ufrag kZ2qkHXX/u11
            a=candidate:1432411780 1 tcp 1671430143 4.155.146.196 443 typ host tcptype passive ufrag kZ2qkHXX/u11
            m=application 9 UDP/DTLS/SCTP webrtc-datachannel
            a=mid:1
            a=sctp-port:5000
  /realtime/calls/{call_id}/accept:
    post:
      summary: |-
        Accept an incoming SIP call and configure the realtime session that will
        handle it.
      operationId: accept-realtime-call
      tags:
        - Realtime
      parameters:
        - in: path
          name: call_id
          required: true
          schema:
            type: string
          description: |-
            The identifier for the call provided in the
            [`realtime.call.incoming`](/docs/api-reference/webhook-events/realtime/call/incoming)
            webhook.
      requestBody:
        required: true
        description: Session configuration to apply before the caller is bridged to the
          model.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RealtimeSessionCreateRequestGA"
      responses:
        "200":
          description: Call accepted successfully.
      x-oaiMeta:
        name: Accept call
        group: realtime-calls
        returns: >-
          Returns `200 OK` once OpenAI starts ringing the SIP leg with the
          supplied

          session configuration.
        examples:
          request:
            curl: >-
              curl -X POST
              https://api.openai.com/v1/realtime/calls/$CALL_ID/accept \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{
                      "type": "realtime",
                      "model": "gpt-realtime",
                      "instructions": "You are Alex, a friendly concierge for Example Corp.",
