    RealtimeServerEventConversationCreated:
      type: object
      description: >
        Returned when a conversation is created. Emitted right after session
        creation.
      properties:
        event_id:
          type: string
          description: The unique ID of the server event.
        type:
          type: string
          enum:
            - conversation.created
          description: The event type, must be `conversation.created`.
          x-stainless-const: true
        conversation:
          type: object
          description: The conversation resource.
          properties:
            id:
              type: string
              description: The unique ID of the conversation.
            object:
              type: string
              description: The object type, must be `realtime.conversation`.
      required:
        - event_id
        - type
        - conversation
      x-oaiMeta:
        name: conversation.created
        group: realtime
        example: |
          {
              "event_id": "event_9101",
              "type": "conversation.created",
              "conversation": {
                  "id": "conv_001",
                  "object": "realtime.conversation"
              }
          }
    RealtimeServerEventConversationItemAdded:
      type: object
      description: >
        Sent by the server when an Item is added to the default Conversation.
        This can happen in several cases:

        - When the client sends a `conversation.item.create` event.

        - When the input audio buffer is committed. In this case the item will
        be a user message containing the audio from the buffer.

        - When the model is generating a Response. In this case the
        `conversation.item.added` event will be sent when the model starts
        generating a specific Item, and thus it will not yet have any content
        (and `status` will be `in_progress`).


        The event will include the full content of the Item (except when model
        is generating a Response) except for audio data, which can be retrieved
        separately with a `conversation.item.retrieve` event if necessary.
      properties:
        event_id:
          type: string
          description: The unique ID of the server event.
        type:
          type: string
          enum:
            - conversation.item.added
          description: The event type, must be `conversation.item.added`.
          x-stainless-const: true
        previous_item_id:
          anyOf:
            - type: string
              description: >
                The ID of the item that precedes this one, if any. This is used
                to

                maintain ordering when items are inserted.
            - type: "null"
        item:
          $ref: "#/components/schemas/RealtimeConversationItem"
      required:
        - event_id
        - type
        - item
      x-oaiMeta:
        name: conversation.item.added
        group: realtime
        example: |
          {
            "type": "conversation.item.added",
            "event_id": "event_C9G8pjSJCfRNEhMEnYAVy",
            "previous_item_id": null,
            "item": {
              "id": "item_C9G8pGVKYnaZu8PH5YQ9O",
              "type": "message",
              "status": "completed",
              "role": "user",
              "content": [
                {
                  "type": "input_text",
                  "text": "hi"
                }
              ]
            }
          }
    RealtimeServerEventConversationItemCreated:
      type: object
      description: >
        Returned when a conversation item is created. There are several
        scenarios that produce this event:
          - The server is generating a Response, which if successful will produce
            either one or two Items, which will be of type `message`
            (role `assistant`) or type `function_call`.
          - The input audio buffer has been committed, either by the client or the
            server (in `server_vad` mode). The server will take the content of the
            input audio buffer and add it to a new user message Item.
          - The client has sent a `conversation.item.create` event to add a new Item
            to the Conversation.
      properties:
        event_id:
          type: string
          description: The unique ID of the server event.
        type:
          type: string
          enum:
            - conversation.item.created
          description: The event type, must be `conversation.item.created`.
          x-stainless-const: true
        previous_item_id:
          anyOf:
            - type: string
              description: >
                The ID of the preceding item in the Conversation context, allows
                the

                client to understand the order of the conversation. Can be
                `null` if the

                item has no predecessor.
            - type: "null"
        item:
          $ref: "#/components/schemas/RealtimeConversationItem"
      required:
        - event_id
        - type
        - item
      x-oaiMeta:
        name: conversation.item.created
        group: realtime
        example: |
          {
              "event_id": "event_1920",
              "type": "conversation.item.created",
              "previous_item_id": "msg_002",
              "item": {
                  "id": "msg_003",
                  "object": "realtime.item",
                  "type": "message",
                  "status": "completed",
                  "role": "user",
                  "content": []
              }
          }
    RealtimeServerEventConversationItemDeleted:
      type: object
      description: >
        Returned when an item in the conversation is deleted by the client with
        a 

        `conversation.item.delete` event. This event is used to synchronize the 

        server's understanding of the conversation history with the client's
        view.
      properties:
        event_id:
          type: string
          description: The unique ID of the server event.
        type:
          type: string
          enum:
            - conversation.item.deleted
          description: The event type, must be `conversation.item.deleted`.
          x-stainless-const: true
        item_id:
          type: string
          description: The ID of the item that was deleted.
