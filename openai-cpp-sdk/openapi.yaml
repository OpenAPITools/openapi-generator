    post:
      operationId: createFile
      tags:
        - Files
      summary: >
        Upload a file that can be used across various endpoints. Individual
        files

        can be up to 512 MB, and each project can store up to 2.5 TB of files in

        total. There is no organization-wide storage limit. Uploads to this

        endpoint are rate-limited to 1,000 requests per minute per authenticated

        user.


        - The Assistants API supports files up to 2 million tokens and of
        specific
          file types. See the [Assistants Tools guide](/docs/assistants/tools) for
          details.
        - The Fine-tuning API only supports `.jsonl` files. The input also has
          certain required formats for fine-tuning
          [chat](/docs/api-reference/fine-tuning/chat-input) or
          [completions](/docs/api-reference/fine-tuning/completions-input) models.
        - The Batch API only supports `.jsonl` files up to 200 MB in size. The
        input
          also has a specific required
          [format](/docs/api-reference/batch/request-input).
        - For Retrieval or `file_search` ingestion, upload files here first. If
          you need to attach multiple uploaded files to the same vector store, use
          [`/vector_stores/{vector_store_id}/file_batches`](/docs/api-reference/vector-stores-file-batches/createBatch)
          instead of attaching them one by one. Vector store attachment has separate
          limits from file upload, including 2,000 attached files per minute per
          organization.

        Please [contact us](https://help.openai.com/) if you need to increase
        these

        storage limits.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateFileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIFile"
      x-oaiMeta:
        name: Upload file
        group: files
        description: >
          Uploads a file for later use across OpenAI APIs. Uploads to this
          endpoint are rate-limited to 1,000 requests per minute per
          authenticated user. For Retrieval or `file_search` ingestion, upload
          files here first. If you need to attach multiple uploaded files to the
          same vector store, use vector store file batches instead of attaching
          them one by one.
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/files \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -F purpose="fine-tune" \
                -F file="@mydata.jsonl"
                -F expires_after[anchor]="created_at"
                -F expires_after[seconds]=2592000
            python: |
              from openai import OpenAI
              client = OpenAI()

              client.files.create(
                file=open("mydata.jsonl", "rb"),
                purpose="fine-tune",
                expires_after={
                  "anchor": "created_at",
                  "seconds": 2592000
                }
              )
            javascript: |-
              import fs from "fs";
              import OpenAI from "openai";

              const openai = new OpenAI();

              async function main() {
                const file = await openai.files.create({
                  file: fs.createReadStream("mydata.jsonl"),
                  purpose: "fine-tune",
                  expires_after: {
                    anchor: "created_at",
                    seconds: 2592000
                  }
                });

                console.log(file);
              }

              main();
          response: |
            {
              "id": "file-abc123",
              "object": "file",
              "bytes": 120000,
              "created_at": 1677610602,
              "expires_at": 1677614202,
              "filename": "mydata.jsonl",
              "purpose": "fine-tune",
            }
