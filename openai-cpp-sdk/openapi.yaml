            entries for longer.
        mode:
          $ref: "#/components/schemas/BetaPromptCacheModeEnum"
          description: Controls whether OpenAI automatically creates an implicit cache
            breakpoint. Defaults to `implicit`. With `implicit`, OpenAI creates
            one implicit breakpoint and writes up to the latest three explicit
            breakpoints in the request. With `explicit`, OpenAI does not create
            an implicit breakpoint and writes up to the latest four explicit
            breakpoints. If there are no explicit breakpoints, the request does
            not use prompt caching.
