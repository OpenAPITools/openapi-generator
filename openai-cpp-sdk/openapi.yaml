        max_completion_tokens:
          type: integer
          nullable: true
          description: >
            The maximum number of completion tokens that may be used over the
            course of the run. The run will make a best effort to use only the
            number of completion tokens specified, across multiple turns of the
            run. If the run exceeds the number of completion tokens specified,
            the run will end with status `incomplete`. See `incomplete_details`
            for more info.
          minimum: 256
        truncation_strategy:
          allOf:
            - $ref: "#/components/schemas/TruncationObject"
            - nullable: true
        tool_choice:
          allOf:
            - $ref: "#/components/schemas/AssistantsApiToolChoiceOption"
            - nullable: true
        parallel_tool_calls:
          $ref: "#/components/schemas/ParallelToolCalls"
        response_format:
          $ref: "#/components/schemas/AssistantsApiResponseFormatOption"
          nullable: true
      required:
        - assistant_id
    CreateThreadRequest:
      type: object
      description: |
        Options to create a new thread. If no thread is provided when running a
        request, an empty thread will be created.
      additionalProperties: false
      properties:
        messages:
          description: A list of [messages](/docs/api-reference/messages) to start the
            thread with.
          type: array
          items:
            $ref: "#/components/schemas/CreateMessageRequest"
        tool_resources:
          anyOf:
            - type: object
              description: >
                A set of resources that are made available to the assistant's
                tools in this thread. The resources are specific to the type of
                tool. For example, the `code_interpreter` tool requires a list
                of file IDs, while the `file_search` tool requires a list of
                vector store IDs.
              properties:
                code_interpreter:
                  type: object
                  properties:
                    file_ids:
                      type: array
                      description: >
                        A list of [file](/docs/api-reference/files) IDs made
                        available to the `code_interpreter` tool. There can be a
                        maximum of 20 files associated with the tool.
                      default: []
                      maxItems: 20
                      items:
                        type: string
                file_search:
                  type: object
                  properties:
                    vector_store_ids:
                      type: array
                      description: >
                        The [vector
                        store](/docs/api-reference/vector-stores/object)
                        attached to this thread. There can be a maximum of 1
                        vector store attached to the thread.
                      maxItems: 1
                      items:
                        type: string
                    vector_stores:
                      type: array
                      description: >
                        A helper to create a [vector
                        store](/docs/api-reference/vector-stores/object) with
                        file_ids and attach it to this thread. There can be a
                        maximum of 1 vector store attached to the thread.
                      maxItems: 1
                      items:
                        type: object
                        properties:
                          file_ids:
                            type: array
                            description: >
                              A list of [file](/docs/api-reference/files) IDs to
                              add to the vector store. For vector stores created
                              before Nov 2025, there can be a maximum of 10,000
                              files in a vector store. For vector stores created
                              starting in Nov 2025, the limit is 100,000,000
                              files.
                            maxItems: 100000000
                            items:
                              type: string
                          chunking_strategy:
                            type: object
                            description: The chunking strategy used to chunk the file(s). If not set, will
                              use the `auto` strategy.
                            oneOf:
                              - type: object
                                title: Auto Chunking Strategy
                                description: The default strategy. This strategy currently uses a
                                  `max_chunk_size_tokens` of `800` and
                                  `chunk_overlap_tokens` of `400`.
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                    description: Always `auto`.
                                    enum:
                                      - auto
                                    x-stainless-const: true
                                required:
                                  - type
                              - type: object
                                title: Static Chunking Strategy
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                    description: Always `static`.
                                    enum:
                                      - static
                                    x-stainless-const: true
                                  static:
                                    type: object
                                    additionalProperties: false
                                    properties:
                                      max_chunk_size_tokens:
                                        type: integer
                                        minimum: 100
                                        maximum: 4096
                                        description: The maximum number of tokens in each chunk. The default value is
                                          `800`. The minimum value is `100` and
                                          the maximum value is `4096`.
                                      chunk_overlap_tokens:
                                        type: integer
                                        description: >
                                          The number of tokens that overlap
                                          between chunks. The default value is
                                          `400`.


                                          Note that the overlap must not exceed
                                          half of `max_chunk_size_tokens`.
                                    required:
                                      - max_chunk_size_tokens
                                      - chunk_overlap_tokens
                                required:
                                  - type
                                  - static
                          metadata:
                            $ref: "#/components/schemas/Metadata"
                  oneOf:
                    - required:
                        - vector_store_ids
                    - required:
                        - vector_stores
            - type: "null"
        metadata:
          $ref: "#/components/schemas/Metadata"
    CreateTranscriptionRequest:
      type: object
      additionalProperties: false
      properties:
        file:
          description: >
            The audio file object (not file name) to transcribe, in one of these
            formats: flac, mp3, mp4, mpeg, mpga, m4a, ogg, wav, or webm.
          type: string
          x-oaiTypeLabel: file
          format: binary
        model:
          description: >
            ID of the model to use. The options are `gpt-4o-transcribe`,
            `gpt-4o-mini-transcribe`, `gpt-4o-mini-transcribe-2025-12-15`,
            `whisper-1` (which is powered by our open source Whisper V2 model),
            and `gpt-4o-transcribe-diarize`.
          example: gpt-4o-transcribe
          anyOf:
            - type: string
            - type: string
              enum:
                - whisper-1
                - gpt-4o-transcribe
                - gpt-4o-mini-transcribe
                - gpt-4o-mini-transcribe-2025-12-15
                - gpt-4o-transcribe-diarize
              x-stainless-const: true
          x-oaiTypeLabel: string
        language:
          description: >
            The language of the input audio. Supplying the input language in
            [ISO-639-1](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)
            (e.g. `en`) format will improve accuracy and latency.
          type: string
        prompt:
          description: >
            An optional text to guide the model's style or continue a previous
            audio segment. The [prompt](/docs/guides/speech-to-text#prompting)
            should match the audio language. This field is not supported when
            using `gpt-4o-transcribe-diarize`.
          type: string
        response_format:
          $ref: "#/components/schemas/AudioResponseFormat"
        temperature:
          description: >
            The sampling temperature, between 0 and 1. Higher values like 0.8
            will make the output more random, while lower values like 0.2 will
            make it more focused and deterministic. If set to 0, the model will
            use [log probability](https://en.wikipedia.org/wiki/Log_probability)
            to automatically increase the temperature until certain thresholds
            are hit.
          type: number
          default: 0
        include:
          description: >
            Additional information to include in the transcription response.

            `logprobs` will return the log probabilities of the tokens in the

            response to understand the model's confidence in the transcription.

            `logprobs` only works with response_format set to `json` and only
            with

            the models `gpt-4o-transcribe`, `gpt-4o-mini-transcribe`, and
            `gpt-4o-mini-transcribe-2025-12-15`. This field is not supported
            when using `gpt-4o-transcribe-diarize`.
          type: array
          items:
            $ref: "#/components/schemas/TranscriptionInclude"
        timestamp_granularities:
          description: >
            The timestamp granularities to populate for this transcription.
            `response_format` must be set `verbose_json` to use timestamp
            granularities. Either or both of these options are supported:
            `word`, or `segment`. Note: There is no additional latency for
            segment timestamps, but generating word timestamps incurs additional
            latency.

            This option is not available for `gpt-4o-transcribe-diarize`.
          type: array
          items:
            type: string
            enum:
              - word
              - segment
          default:
            - segment
        stream:
          anyOf:
            - description: |
                If set to true, the model response data will be streamed to the client
                as it is generated using [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#Event_stream_format).
                See the [Streaming section of the Speech-to-Text guide](/docs/guides/speech-to-text?lang=curl#streaming-transcriptions)
                for more information.

                Note: Streaming is not supported for the `whisper-1` model and will be ignored.
              type: boolean
              default: false
            - type: "null"
        chunking_strategy:
          anyOf:
            - description: 'Controls how the audio is cut into chunks. When set to `"auto"`,
                the server first normalizes loudness and then uses voice
                activity detection (VAD) to choose boundaries. `server_vad`
                object can be provided to tweak VAD detection parameters
                manually. If unset, the audio is transcribed as a single block.
                Required when using `gpt-4o-transcribe-diarize` for inputs
                longer than 30 seconds. '
              anyOf:
                - type: string
                  enum:
                    - auto
                  default: auto
                  description: >
                    Automatically set chunking parameters based on the audio.
                    Must be set to `"auto"`.
                  x-stainless-const: true
                - $ref: "#/components/schemas/VadConfig"
              x-oaiTypeLabel: string
            - type: "null"
        known_speaker_names:
          description: >
            Optional list of speaker names that correspond to the audio samples
            provided in `known_speaker_references[]`. Each entry should be a
            short identifier (for example `customer` or `agent`). Up to 4
            speakers are supported.
          type: array
          maxItems: 4
          items:
            type: string
        known_speaker_references:
          description: |
            Optional list of audio samples (as [data URLs](https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/Data_URLs)) that contain known speaker references matching `known_speaker_names[]`. Each sample must be between 2 and 10 seconds, and can use any of the same input audio formats supported by `file`.
          type: array
          maxItems: 4
          items:
            type: string
      required:
        - file
        - model
    CreateTranscriptionResponseDiarizedJson:
      type: object
      description: >
        Represents a diarized transcription response returned by the model,
        including the combined transcript and speaker-segment annotations.
      properties:
