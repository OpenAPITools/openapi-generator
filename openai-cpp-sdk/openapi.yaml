  /audio/speech:
    post:
      operationId: createSpeech
      tags:
        - Audio
      summary: |
        Generates audio from the input text.

        Returns the audio file content, or a stream of audio events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpeechRequest"
      responses:
        "200":
          description: OK
          headers:
            Transfer-Encoding:
              schema:
                type: string
              description: chunked
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/event-stream:
              schema:
                $ref: "#/components/schemas/CreateSpeechResponseStreamEvent"
      x-oaiMeta:
        name: Create speech
        group: audio
        examples:
          - title: Default
            request:
              curl: |
                curl https://api.openai.com/v1/audio/speech \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "model": "gpt-4o-mini-tts",
                    "input": "The quick brown fox jumped over the lazy dog.",
                    "voice": "alloy"
                  }' \
                  --output speech.mp3
              python: |
                from pathlib import Path
                import openai

                speech_file_path = Path(__file__).parent / "speech.mp3"
                with openai.audio.speech.with_streaming_response.create(
                  model="gpt-4o-mini-tts",
                  voice="alloy",
                  input="The quick brown fox jumped over the lazy dog."
                ) as response:
                  response.stream_to_file(speech_file_path)
              javascript: >
                import fs from "fs";

                import path from "path";

                import OpenAI from "openai";


                const openai = new OpenAI();


                const speechFile = path.resolve("./speech.mp3");


                async function main() {
                  const mp3 = await openai.audio.speech.create({
                    model: "gpt-4o-mini-tts",
                    voice: "alloy",
                    input: "Today is a wonderful day to build something people love!",
                  });
                  console.log(speechFile);
                  const buffer = Buffer.from(await mp3.arrayBuffer());
                  await fs.promises.writeFile(speechFile, buffer);
                }

                main();
              csharp: |
                using System;
                using System.IO;

                using OpenAI.Audio;

                AudioClient client = new(
                    model: "gpt-4o-mini-tts",
                    apiKey: Environment.GetEnvironmentVariable("OPENAI_API_KEY")
                );

                BinaryData speech = client.GenerateSpeech(
                    text: "The quick brown fox jumped over the lazy dog.",
                    voice: GeneratedSpeechVoice.Alloy
                );

                using FileStream stream = File.OpenWrite("speech.mp3");
                speech.ToStream().CopyTo(stream);
          - title: SSE Stream Format
            request:
              curl: |
                curl https://api.openai.com/v1/audio/speech \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "model": "gpt-4o-mini-tts",
                    "input": "The quick brown fox jumped over the lazy dog.",
                    "voice": "alloy",
                    "stream_format": "sse"
                  }'
  /audio/transcriptions:
    post:
      operationId: createTranscription
      tags:
        - Audio
      summary: >
        Transcribes audio into the input language.


        Returns a transcription object in `json`, `diarized_json`, or
        `verbose_json`

        format, or a stream of transcript events.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateTranscriptionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CreateTranscriptionResponseJson"
                  - $ref: "#/components/schemas/CreateTranscriptionResponseDiarizedJson"
                  - $ref: "#/components/schemas/CreateTranscriptionResponseVerboseJson"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/CreateTranscriptionResponseStreamEvent"
      x-oaiMeta:
        name: Create transcription
        group: audio
        examples:
          - title: Default
            request:
              curl: |
                curl https://api.openai.com/v1/audio/transcriptions \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -H "Content-Type: multipart/form-data" \
                  -F file="@/path/to/file/audio.mp3" \
                  -F model="gpt-4o-transcribe"
              python: |
                from openai import OpenAI
                client = OpenAI()

                audio_file = open("speech.mp3", "rb")
                transcript = client.audio.transcriptions.create(
                  model="gpt-4o-transcribe",
                  file=audio_file
                )
              javascript: >
                import fs from "fs";

                import OpenAI from "openai";


                const openai = new OpenAI();


                async function main() {
                  const transcription = await openai.audio.transcriptions.create({
                    file: fs.createReadStream("audio.mp3"),
                    model: "gpt-4o-transcribe",
                  });

                  console.log(transcription.text);
                }

                main();
              csharp: >
                using System;


                using OpenAI.Audio;

                string audioFilePath = "audio.mp3";


                AudioClient client = new(
                    model: "gpt-4o-transcribe",
                    apiKey: Environment.GetEnvironmentVariable("OPENAI_API_KEY")
                );


                AudioTranscription transcription =
                client.TranscribeAudio(audioFilePath);


                Console.WriteLine($"{transcription.Text}");
            response: >
              {
                "text": "Imagine the wildest idea that you've ever had, and you're curious about how it might scale to something that's a 100, a 1,000 times bigger. This is a place where you can get to do that.",
                "usage": {
                  "type": "tokens",
                  "input_tokens": 14,
                  "input_token_details": {
                    "text_tokens": 0,
                    "audio_tokens": 14
                  },
                  "output_tokens": 45,
                  "total_tokens": 59
                }
              }
          - title: Diarization
            request:
              curl: |
                curl https://api.openai.com/v1/audio/transcriptions \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -H "Content-Type: multipart/form-data" \
                  -F file="@/path/to/file/meeting.wav" \
                  -F model="gpt-4o-transcribe-diarize" \
                  -F response_format="diarized_json" \
                  -F chunking_strategy=auto \
                  -F 'known_speaker_names[]=agent' \
                  -F 'known_speaker_references[]=data:audio/wav;base64,AAA...'
              python: >
                import base64

                from openai import OpenAI


                client = OpenAI()


                def to_data_url(path: str) -> str:
                  with open(path, "rb") as fh:
                    return "data:audio/wav;base64," + base64.b64encode(fh.read()).decode("utf-8")

                with open("meeting.wav", "rb") as audio_file:
                  transcript = client.audio.transcriptions.create(
                    model="gpt-4o-transcribe-diarize",
                    file=audio_file,
                    response_format="diarized_json",
                    chunking_strategy="auto",
                    extra_body={
                      "known_speaker_names": ["agent"],
                      "known_speaker_references": [to_data_url("agent.wav")],
                    },
                  )

                print(transcript.segments)
              javascript: >
                import fs from "fs";

                import OpenAI from "openai";


                const openai = new OpenAI();


                const speakerRef =
                fs.readFileSync("agent.wav").toString("base64");


                const transcript = await openai.audio.transcriptions.create({
                  file: fs.createReadStream("meeting.wav"),
                  model: "gpt-4o-transcribe-diarize",
                  response_format: "diarized_json",
                  chunking_strategy: "auto",
                  extra_body: {
                    known_speaker_names: ["agent"],
                    known_speaker_references: [`data:audio/wav;base64,${speakerRef}`],
                  },
                });


                console.log(transcript.segments);
            response: >
              {
                "task": "transcribe",
                "duration": 27.4,
                "text": "Agent: Thanks for calling OpenAI support.\nA: Hi, I'm trying to enable diarization.\nAgent: Happy to walk you through the steps.",
                "segments": [
                  {
                    "type": "transcript.text.segment",
                    "id": "seg_001",
                    "start": 0.0,
                    "end": 4.7,
                    "text": "Thanks for calling OpenAI support.",
                    "speaker": "agent"
                  },
                  {
