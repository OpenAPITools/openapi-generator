        example: |
          {
              "event_id": "event_2728",
              "type": "conversation.item.deleted",
              "item_id": "msg_005"
          }
    RealtimeServerEventConversationItemDone:
      type: object
      description: >
        Returned when a conversation item is finalized.


        The event will include the full content of the Item except for audio
        data, which can be retrieved separately with a
        `conversation.item.retrieve` event if needed.
      properties:
        event_id:
          type: string
          description: The unique ID of the server event.
        type:
          type: string
          enum:
            - conversation.item.done
          description: The event type, must be `conversation.item.done`.
          x-stainless-const: true
        previous_item_id:
          anyOf:
            - type: string
              description: >
                The ID of the item that precedes this one, if any. This is used
                to

                maintain ordering when items are inserted.
            - type: "null"
        item:
          $ref: "#/components/schemas/RealtimeConversationItem"
      required:
        - event_id
        - type
        - item
      x-oaiMeta:
        name: conversation.item.done
        group: realtime
        example: >
          {
            "type": "conversation.item.done",
            "event_id": "event_CCXLgMZPo3qioWCeQa4WH",
            "previous_item_id": "item_CCXLecNJVIVR2HUy3ABLj",
            "item": {
              "id": "item_CCXLfxmM5sXVJVz4mCa2S",
              "type": "message",
              "status": "completed",
              "role": "assistant",
              "content": [
                {
                  "type": "output_audio",
                  "transcript": "Oh, I can hear you loud and clear! Sounds like we're connected just fine. What can I help you with today?"
                }
              ]
            }
          }
    RealtimeServerEventConversationItemInputAudioTranscriptionCompleted:
      type: object
      description: >
        This event is the output of audio transcription for user audio written
        to the

        user audio buffer. Transcription begins when the input audio buffer is

        committed by the client or server (when VAD is enabled). Transcription
        runs

        asynchronously with Response creation, so this event may come before or
        after

        the Response events.


        Realtime API models accept audio natively, and thus input transcription
        is a

        separate process run on a separate ASR (Automatic Speech Recognition)
        model.

        The transcript may diverge somewhat from the model's interpretation, and

        should be treated as a rough guide.
      properties:
        event_id:
