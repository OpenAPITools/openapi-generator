  /audio/voice_consents:
    post:
      operationId: createVoiceConsent
      tags:
        - Audio
      summary: Upload a voice consent recording.
      description: >
        Upload a consent recording that authorizes creation of a custom voice.


        See the [custom voices guide](/docs/guides/text-to-speech#custom-voices)
        for requirements and best practices. Custom voices are limited to
        eligible customers.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateVoiceConsentRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceConsentResource"
      x-oaiMeta:
        name: Create voice consent
        group: audio
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/audio/voice_consents \
                -X POST \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -F "name=John Doe" \
                -F "language=en-US" \
                -F "recording=@$HOME/consent_recording.wav;type=audio/x-wav"
    get:
      operationId: listVoiceConsents
      tags:
        - Audio
      summary: Returns a list of voice consent recordings.
      description: >
        List consent recordings available to your organization for creating
        custom voices.


        See the [custom voices
        guide](/docs/guides/text-to-speech#custom-voices). Custom voices are
        limited to eligible customers.
      parameters:
        - in: query
          name: after
          required: false
          schema:
            type: string
          description: >
            A cursor for use in pagination. `after` is an object ID that defines
            your place in the list. For instance, if you make a list request and
            receive 100 objects, ending with obj_foo, your subsequent call can
            include after=obj_foo in order to fetch the next page of the list.
        - name: limit
          in: query
          description: >
            A limit on the number of objects to be returned. Limit can range
            between 1 and 100, and the default is 20.
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceConsentListResource"
      x-oaiMeta:
        name: List voice consents
        group: audio
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/audio/voice_consents?limit=20 \
                -H "Authorization: Bearer $OPENAI_API_KEY"
