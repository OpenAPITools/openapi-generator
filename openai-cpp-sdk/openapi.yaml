    RealtimeTruncation:
      title: Realtime Truncation Controls
      description: >
        When the number of tokens in a conversation exceeds the model's input
        token limit, the conversation be truncated, meaning messages (starting
        from the oldest) will not be included in the model's context. A 32k
        context model with 4,096 max output tokens can only include 28,224
        tokens in the context before truncation occurs.


        Clients can configure truncation behavior to truncate with a lower max
        token limit, which is an effective way to control token usage and cost.


        Truncation will reduce the number of cached tokens on the next turn
        (busting the cache), since messages are dropped from the beginning of
        the context. However, clients can also configure truncation to retain
        messages up to a fraction of the maximum context size, which will reduce
        the need for future truncations and thus improve the cache rate.


        Truncation can be disabled entirely, which means the server will never
        truncate but would instead return an error if the conversation exceeds
        the model's input token limit.
      oneOf:
        - type: string
          description: The truncation strategy to use for the session. `auto` is the
            default truncation strategy. `disabled` will disable truncation and
            emit errors when the conversation exceeds the input token limit.
          enum:
            - auto
            - disabled
        - type: object
          title: Retention ratio truncation
          description: Retain a fraction of the conversation tokens when the conversation
            exceeds the input token limit. This allows you to amortize
            truncations across multiple turns, which can help improve cached
            token usage.
          properties:
            type:
              type: string
              enum:
                - retention_ratio
              description: Use retention ratio truncation.
              x-stainless-const: true
            retention_ratio:
              type: number
              description: >
                Fraction of post-instruction conversation tokens to retain
                (`0.0` - `1.0`) when the conversation exceeds the input token
                limit. Setting this to `0.8` means that messages will be dropped
                until 80% of the maximum allowed tokens are used. This helps
                reduce the frequency of truncations and improve cache rates.
              minimum: 0
              maximum: 1
            token_limits:
              type: object
              description: Optional custom token limits for this truncation strategy. If not
                provided, the model's default token limits will be used.
              properties:
                post_instructions:
                  type: integer
                  description: Maximum tokens allowed in the conversation after instructions
                    (which including tool definitions). For example, setting
                    this to 5,000 would mean that truncation would occur when
                    the conversation exceeds 5,000 tokens after instructions.
                    This cannot be higher than the model's context window size
                    minus the maximum output tokens.
                  minimum: 0
          required:
            - type
            - retention_ratio
    RealtimeTurnDetection:
      anyOf:
        - title: Realtime Turn Detection
          description: >
            Configuration for turn detection, ether Server VAD or Semantic VAD.
            This can be set to `null` to turn off, in which case the client must
            manually trigger model response.


            Server VAD means that the model will detect the start and end of
            speech based on audio volume and respond at the end of user speech.


            Semantic VAD is more advanced and uses a turn detection model (in
            conjunction with VAD) to semantically estimate whether the user has
            finished speaking, then dynamically sets a timeout based on this
            probability. For example, if user audio trails off with "uhhm", the
            model will score a low probability of turn end and wait longer for
            the user to continue speaking. This can be useful for more natural
            conversations, but may have a higher latency.


            For `gpt-realtime-whisper` transcription sessions, turn detection
            must be

            set to `null`; VAD is not supported.
          oneOf:
            - type: object
              title: Server VAD
              description: Server-side voice activity detection (VAD) which flips on when user
                speech is detected and off after a period of silence.
              required:
                - type
              properties:
                type:
                  type: string
                  default: server_vad
                  const: server_vad
                  description: >
                    Type of turn detection, `server_vad` to turn on simple
                    Server VAD.
                threshold:
                  type: number
                  description: >
                    Used only for `server_vad` mode. Activation threshold for
                    VAD (0.0 to 1.0), this defaults to 0.5. A

                    higher threshold will require louder audio to activate the
                    model, and

                    thus might perform better in noisy environments.
                prefix_padding_ms:
                  type: integer
                  description: >
                    Used only for `server_vad` mode. Amount of audio to include
                    before the VAD detected speech (in

                    milliseconds). Defaults to 300ms.
                silence_duration_ms:
                  type: integer
                  description: >
                    Used only for `server_vad` mode. Duration of silence to
                    detect speech stop (in milliseconds). Defaults

                    to 500ms. With shorter values the model will respond more
                    quickly,

                    but may jump in on short pauses from the user.
                create_response:
                  type: boolean
                  default: true
                  description: >
                    Whether or not to automatically generate a response when a
                    VAD stop event occurs. If `interrupt_response` is set to
                    `false` this may fail to create a response if the model is
                    already responding.


                    If both `create_response` and `interrupt_response` are set
                    to `false`, the model will never respond automatically but
                    VAD events will still be emitted.
                interrupt_response:
                  type: boolean
                  default: true
                  description: >
                    Whether or not to automatically interrupt (cancel) any
                    ongoing response with output to the default

                    conversation (i.e. `conversation` of `auto`) when a VAD
                    start event occurs. If `true` then the response will be
                    cancelled, otherwise it will continue until complete.


                    If both `create_response` and `interrupt_response` are set
                    to `false`, the model will never respond automatically but
                    VAD events will still be emitted.
                idle_timeout_ms:
                  anyOf:
                    - type: integer
                      minimum: 5000
                      maximum: 30000
                      description: >
                        Optional timeout after which a model response will be
                        triggered automatically. This is

                        useful for situations in which a long pause from the
                        user is unexpected, such as a phone

                        call. The model will effectively prompt the user to
                        continue the conversation based

                        on the current context.


                        The timeout value will be applied after the last model
                        response's audio has finished playing,

                        i.e. it's set to the `response.done` time plus audio
                        playback duration.


                        An `input_audio_buffer.timeout_triggered` event (plus
                        events

                        associated with the Response) will be emitted when the
                        timeout is reached.

                        Idle timeout is currently only supported for
                        `server_vad` mode.
                    - type: "null"
            - type: object
              title: Semantic VAD
              description: Server-side semantic turn detection which uses a model to determine
                when the user has finished speaking.
              required:
                - type
              properties:
                type:
                  type: string
                  const: semantic_vad
                  description: >
                    Type of turn detection, `semantic_vad` to turn on Semantic
                    VAD.
                eagerness:
                  type: string
                  default: auto
                  enum:
                    - low
                    - medium
                    - high
                    - auto
                  description: >
                    Used only for `semantic_vad` mode. The eagerness of the
                    model to respond. `low` will wait longer for the user to
                    continue speaking, `high` will respond more quickly. `auto`
                    is the default and is equivalent to `medium`. `low`,
                    `medium`, and `high` have max timeouts of 8s, 4s, and 2s
                    respectively.
                create_response:
                  type: boolean
                  default: true
                  description: >
                    Whether or not to automatically generate a response when a
                    VAD stop event occurs.
                interrupt_response:
                  type: boolean
                  default: true
                  description: >
                    Whether or not to automatically interrupt any ongoing
                    response with output to the default

                    conversation (i.e. `conversation` of `auto`) when a VAD
                    start event occurs.
          discriminator:
            propertyName: type
        - type: "null"
    Reasoning:
      type: object
      description: |
        **gpt-5 and o-series models only**

        Configuration options for
        [reasoning models](https://platform.openai.com/docs/guides/reasoning).
      title: Reasoning
