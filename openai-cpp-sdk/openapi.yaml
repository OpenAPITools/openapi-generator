  /images/edits:
    post:
      operationId: createImageEdit
      tags:
        - Images
      summary: Creates an edited or extended image given one or more source images and
        a prompt. This endpoint supports GPT Image models (`gpt-image-1.5`,
        `gpt-image-1`, `gpt-image-1-mini`, and `chatgpt-image-latest`) and
        `dall-e-2`.
      description: >
        You can call this endpoint with either:


        - `multipart/form-data`: use binary uploads via `image` (and optional
        `mask`).

        - `application/json`: use `images` (and optional `mask`) as references
        with either `image_url` or `file_id`.


        Note that JSON requests use `images` (array) instead of the multipart
        `image` field.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateImageEditRequest"
            examples:
              multipart_edit:
                summary: Multipart form upload (binary image + prompt)
                value:
                  model: gpt-image-1.5
                  prompt: Add a watercolor effect to this image
                  image: <binary image file>
                  size: 1024x1024
                  quality: high
          application/json:
            schema:
              $ref: "#/components/schemas/EditImageBodyJsonParam"
            examples:
              json_with_url:
                summary: JSON request with image URL
                value:
                  model: gpt-image-1.5
                  prompt: Add a watercolor effect to this image
                  images:
                    - image_url: https://example.com/source-image.png
                  size: 1024x1024
                  quality: high
              json_with_file_id:
                summary: JSON request with uploaded file id
                value:
                  model: gpt-image-1.5
                  prompt: Replace the background with a snowy mountain scene
                  images:
                    - file_id: file-abc123
                  mask:
                    file_id: file-mask123
                  output_format: png
                  output_compression: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImagesResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ImageEditStreamEvent"
      x-oaiMeta:
        name: Create image edit
        group: images
        examples:
          - title: Edit image
            request:
              curl: >
                curl -s -D >(grep -i x-request-id >&2) \
                  -o >(jq -r '.data[0].b64_json' | base64 --decode > gift-basket.png) \
                  -X POST "https://api.openai.com/v1/images/edits" \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -F "model=gpt-image-1.5" \
                  -F "image[]=@body-lotion.png" \
                  -F "image[]=@bath-bomb.png" \
                  -F "image[]=@incense-kit.png" \
                  -F "image[]=@soap.png" \
                  -F 'prompt=Create a lovely gift basket with these four items in it'
              python: >
                import base64

                from openai import OpenAI

                client = OpenAI()


                prompt = """

                Generate a photorealistic image of a gift basket on a white
                background

                labeled 'Relax & Unwind' with a ribbon and handwriting-like
                font,

                containing all the items in the reference pictures.

                """


                result = client.images.edit(
                    model="gpt-image-1.5",
                    image=[
                        open("body-lotion.png", "rb"),
                        open("bath-bomb.png", "rb"),
                        open("incense-kit.png", "rb"),
                        open("soap.png", "rb"),
                    ],
                    prompt=prompt
                )


                image_base64 = result.data[0].b64_json

                image_bytes = base64.b64decode(image_base64)


                # Save the image to a file

                with open("gift-basket.png", "wb") as f:
                    f.write(image_bytes)
              javascript: >
                import fs from "fs";

                import OpenAI, { toFile } from "openai";


                const client = new OpenAI();


                const imageFiles = [
                    "bath-bomb.png",
                    "body-lotion.png",
                    "incense-kit.png",
                    "soap.png",
                ];


                const images = await Promise.all(
                    imageFiles.map(async (file) =>
                        await toFile(fs.createReadStream(file), null, {
                            type: "image/png",
                        })
                    ),
                );


                const rsp = await client.images.edit({
                    model: "gpt-image-1.5",
                    image: images,
                    prompt: "Create a lovely gift basket with these four items in it",
                });


                // Save the image to a file

                const image_base64 = rsp.data[0].b64_json;

                const image_bytes = Buffer.from(image_base64, "base64");

                fs.writeFileSync("basket.png", image_bytes);
          - title: Streaming
            request:
              curl: >
                curl -s -N -X POST "https://api.openai.com/v1/images/edits" \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -F "model=gpt-image-1.5" \
                  -F "image[]=@body-lotion.png" \
                  -F "image[]=@bath-bomb.png" \
                  -F "image[]=@incense-kit.png" \
                  -F "image[]=@soap.png" \
                  -F 'prompt=Create a lovely gift basket with these four items in it' \
                  -F "stream=true"
              python: >
                from openai import OpenAI


                client = OpenAI()


                prompt = """

                Generate a photorealistic image of a gift basket on a white
                background

                labeled 'Relax & Unwind' with a ribbon and handwriting-like
                font,

                containing all the items in the reference pictures.

                """


                stream = client.images.edit(
                    model="gpt-image-1.5",
                    image=[
                        open("body-lotion.png", "rb"),
                        open("bath-bomb.png", "rb"),
                        open("incense-kit.png", "rb"),
                        open("soap.png", "rb"),
                    ],
                    prompt=prompt,
                    stream=True
                )


                for event in stream:
                    print(event)
              javascript: >
                import fs from "fs";

                import OpenAI, { toFile } from "openai";


                const client = new OpenAI();


                const imageFiles = [
                    "bath-bomb.png",
                    "body-lotion.png",
                    "incense-kit.png",
                    "soap.png",
                ];


                const images = await Promise.all(
                    imageFiles.map(async (file) =>
                        await toFile(fs.createReadStream(file), null, {
                            type: "image/png",
                        })
                    ),
                );


                const stream = await client.images.edit({
                    model: "gpt-image-1.5",
                    image: images,
                    prompt: "Create a lovely gift basket with these four items in it",
                    stream: true,
                });


                for await (const event of stream) {
                    console.log(event);
                }
            response: |
              event: image_edit.partial_image
              data: {"type":"image_edit.partial_image","b64_json":"...","partial_image_index":0}

              event: image_edit.completed
              data: {"type":"image_edit.completed","b64_json":"...","usage":{"total_tokens":100,"input_tokens":50,"output_tokens":50,"input_tokens_details":{"text_tokens":10,"image_tokens":40}}}
