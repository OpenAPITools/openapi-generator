name: Samples Ruby 

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - 'samples/client/echo_api/ruby-httpx/**'
      - 'samples/client/echo_api/ruby-faraday/**'
      - 'samples/client/echo_api/ruby-typhoeus/**'
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - 'samples/client/echo_api/ruby-httpx/**'
      - 'samples/client/echo_api/ruby-faraday/**'
      - 'samples/client/echo_api/ruby-typhoeus/**'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/client/echo_api/ruby-httpx
            samples/client/echo_api/ruby-faraday
            samples/client/echo_api/ruby-typhoeus

  build:
    name: Build Ruby
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup node.js
        uses: actions/setup-node@v5
      - name: Run echo server
        run: |
          git clone https://github.com/wing328/http-echo-server -b openapi-generator-test-server
          (cd http-echo-server && npm install && npm start &)
      - uses: actions/setup-ruby@v1
        with:
          ruby-version: 3.0
          bundler-cache: true
      - name: Install bundle
        working-directory: ${{ matrix.sample }}
        run: bundle install
      - name: Run rspec
        working-directory: ${{ matrix.sample }}
        run: rspec
