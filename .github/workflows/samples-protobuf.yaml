name: Samples Protobuf
on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - .github/workflows/samples-protobuf.yaml
      - samples/config/petstore/protobuf-schema/**
      - samples/config/petstore/protobuf-schema-config/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - .github/workflows/samples-protobuf.yaml
      - samples/config/petstore/protobuf-schema/**
      - samples/config/petstore/protobuf-schema-config/**
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            'samples/config/petstore/protobuf-schema/'
            'samples/config/petstore/protobuf-schema-config/'
            'samples/config/petstore/protobuf-schema-config-complex/'

  build:
    name: Build Protobuf Client
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Protocol Buffers Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Generate Protobuf Schema
        working-directory: ${{ matrix.sample }}
        run: |
          mkdir out
          protoc --proto_path=. --cpp_out=out models/*.proto services/*.proto
      - name: Verify Generated Files
        working-directory: ${{ matrix.sample }}
        run: |
          ls -l out/models
          ls -l out/services