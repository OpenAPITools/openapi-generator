name: Samples Elm

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - .github/workflows/samples-elm.yaml
      - samples/client/petstore/elm/**
      - samples/openapi3/client/elm/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - .github/workflows/samples-elm.yaml
      - samples/client/petstore/elm/**
      - samples/openapi3/client/elm/**
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/client/petstore/elm
            samples/openapi3/client/elm

  build:
    name: Build Elm clients
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1
      - name: Build
        working-directory: ${{ matrix.sample }}
        # Try to compile all .elm files
        # This fails if:
        # An .elm file couldn't be compiled
        # No .elm files were found
        # No elm.json file could be found in the root of the working directory
        run: elm make $(find . -name "*.elm") --output=/dev/null
