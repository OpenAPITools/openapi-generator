name: Samples Go

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - 'samples/server/petstore/go-echo-server/**'
      - 'samples/server/petstore/go-api-server/**'
      - 'samples/server/petstore/go-chi-server/**'
      - 'samples/server/others/go-server/**'
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - 'samples/server/petstore/go-echo-server/**'
      - 'samples/server/petstore/go-api-server/**'
      - 'samples/server/petstore/go-chi-server/**'
      - 'samples/server/others/go-server/**'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/server/petstore/go-echo-server/
            samples/server/petstore/go-api-server/
            samples/server/petstore/go-chi-server/
            samples/server/others/go-server/no-body-path-params/
            samples/server/others/go-server/optional-body/

  build:
    name: Build Go
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - run: go version
      - name: Run test
        working-directory: ${{ matrix.sample }}
        run: go test -mod=mod -v

  verify:
    name: Verify generated Go files with Go tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sample:
          - samples/server/petstore/go-api-server/
        go-version:
          - "1.18"
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install Dependencies
        working-directory: ${{ matrix.sample }}
        run: |
          go mod tidy
      - name: Run tests
        working-directory: ${{ matrix.sample }}
        run: go test ./samples_tests -v
