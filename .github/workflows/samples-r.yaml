name: Samples R clients

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/client/petstore/R/**
      - samples/client/petstore/R-httr2/**
      - samples/client/petstore/R-httr2-wrapper/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/client/petstore/R/**
      - samples/client/petstore/R-httr2/**
      - samples/client/petstore/R-httr2-wrapper/**
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/client/petstore/R
            samples/client/petstore/R-httr2
            samples/client/petstore/R-httr2-wrapper

  build:
    name: Build R projects
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    services:
      petstore-api:
        image: swaggerapi/petstore
        ports:
          - 80:8080
        env:
          SWAGGER_HOST: http://petstore.swagger.io
          SWAGGER_BASE_PATH: /v2
    steps:
      - uses: actions/checkout@v5
      - name: Add hosts to /etc/hosts
        run: |
            sudo echo "127.0.0.1 petstore.swagger.io" | sudo tee -a /etc/hosts
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install devtools
        run: install.packages("devtools")
        shell: Rscript {0}
        working-directory: ${{ matrix.sample }}

      - name: Build 
        run: devtools::build()
        shell: Rscript {0}
        working-directory: ${{ matrix.sample }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: ${{ matrix.sample }}
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: ${{ matrix.sample }}
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"error"'

      - name: Install local package
        run: R CMD INSTALL .
        shell: bash # Ensure correct shell for command execution
        working-directory: ${{ matrix.sample }}
