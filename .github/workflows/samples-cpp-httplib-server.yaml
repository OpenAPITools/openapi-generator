name: Samples cpp httplib server

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - "samples/server/petstore/cpp-httplib-server/**"
      - ".github/workflows/samples-cpp-httplib-server.yaml"
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - "samples/server/petstore/cpp-httplib-server/**"
      - ".github/workflows/samples-cpp-httplib-server.yaml"

env:
  GRADLE_VERSION: 6.9

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      samples: ${{ steps.filter.outputs.samples }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/server/petstore/cpp-httplib-server/petstore
            samples/server/petstore/cpp-httplib-server/feature-test

  build:
    name: Build cpp httplib server
    needs: setup
    if: ${{ needs.setup.outputs.samples != '[]' }}
    strategy:
      matrix:
        sample: ${{ fromJson(needs.setup.outputs.samples) }}
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev cmake

      - name: Install dependencies (macOS)
        if: matrix.os == 'macOS-latest'
        run: |
          brew install openssl zlib cmake

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install openssl:x64-windows zlib:x64-windows
        shell: cmd
        timeout-minutes: 20

      - name: Build
        working-directory: ${{ matrix.sample }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          else
            cmake -S . -B build
          fi
          cmake --build build --verbose
        shell: bash