name: Samples C# .Net 6 Server

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/server/petstore/aspnetcore-6.0/**
      - samples/server/petstore/aspnetcore-6.0-*/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/server/petstore/aspnetcore-6.0/**
      - samples/server/petstore/aspnetcore-6.0-*/**
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/server/petstore/aspnetcore-6.0
            samples/server/petstore/aspnetcore-6.0-NewtonsoftFalse
            samples/server/petstore/aspnetcore-6.0-nullableReferenceTypes
            samples/server/petstore/aspnetcore-6.0-pocoModels
            samples/server/petstore/aspnetcore-6.0-project4Models
            samples/server/petstore/aspnetcore-6.0-useSwashBuckle

  build:
    name: Build .Net 6 servers
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '6.0.x'
      - name: Build
        working-directory: ${{ matrix.sample }}
        run: dotnet build Org.OpenAPITools.sln
      - name: Test
        working-directory: ${{ matrix.sample }}
        run: dotnet test Org.OpenAPITools.sln
