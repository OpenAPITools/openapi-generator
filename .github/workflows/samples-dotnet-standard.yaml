name: Samples C# .Net Standard Client

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/client/petstore/csharp/generichost/standard2.0/**
      - samples/client/petstore/csharp/httpclient/standard2.0/**
      - samples/client/petstore/csharp/restsharp/standard2.0/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/client/petstore/csharp/generichost/standard2.0/**
      - samples/client/petstore/csharp/httpclient/standard2.0/**
      - samples/client/petstore/csharp/restsharp/standard2.0/**
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/client/petstore/csharp/generichost/standard2.0/Petstore/
            samples/client/petstore/csharp/httpclient/standard2.0/Petstore/
            samples/client/petstore/csharp/restsharp/standard2.0/Petstore/
            samples/client/petstore/csharp/restsharp/standard2.0/ConditionalSerialization/
            # Commented-out samples from original matrix:
            # - samples/client/petstore/csharp/unityWebRequest/standard2.0/Petstore/

  build:
    name: Build .Net Standard projects
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 3.1.*
      - name: Build
        working-directory: ${{ matrix.sample }}
        run: dotnet build Org.OpenAPITools.sln
      # skip tests as petstore server it not running
      # these tests are run in appveyor instead
      #- name: Test
      #  working-directory: ${{ matrix.sample }}
      #  run: dotnet test Org.OpenAPITools.sln
