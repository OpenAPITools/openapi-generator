name: "Python Client pydantic v1: Petstore"

on:
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/openapi3/client/petstore/python-pydantic-v1-aiohttp/**
      - samples/openapi3/client/petstore/python-pydantic-v1/**
      - .github/workflows/samples-python-pydantic-v1-petstore.yaml

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      samples: ${{ steps.filter.outputs.samples }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/openapi3/client/petstore/python-pydantic-v1-aiohttp
            samples/openapi3/client/petstore/python-pydantic-v1

  build:
    name: Test Python client
    needs: setup
    if: ${{ needs.setup.outputs.samples != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
        sample: ${{ fromJson(needs.setup.outputs.samples) }}
    services:
      petstore-api:
        image: swaggerapi/petstore
        ports:
          - 80:8080
        env:
          SWAGGER_HOST: http://petstore.swagger.io
          SWAGGER_BASE_PATH: /v2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        id: py
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-python-${{ steps.py.outputs.python-version }}-
          path: |
            ~/.cache/pypoetry/virtualenvs/
            ~/.local/pipx/venvs/poetry/
            .mypy_cache/

      - name: Install poetry
        run: pipx install --python '${{ steps.py.outputs.python-path }}' poetry

      - name: Install
        working-directory: ${{ matrix.sample }}
        run: poetry install

      - name: Test
        working-directory: ${{ matrix.sample }}
        run: poetry run pytest -v
