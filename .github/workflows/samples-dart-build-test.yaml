name: Samples Dart (build, test)

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      #- samples/openapi3/client/petstore/dart2/petstore_client_lib_fake/**
      #- samples/openapi3/client/petstore/dart-dio/petstore_client_lib_fake_tests/**
      #- samples/openapi3/client/petstore/dart-dio/petstore_client_lib_fake-json_serializable/**
      - samples/openapi3/client/petstore/dart-dio/petstore_client_lib_fake/**
      - samples/openapi3/client/petstore/dart-dio/oneof/**
      - samples/openapi3/client/petstore/dart-dio/oneof_polymorphism_and_inheritance/**
      - samples/openapi3/client/petstore/dart-dio/binary_response/**
      - samples/openapi3/client/petstore/dart-dio/petstore-timemachine/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      #- samples/openapi3/client/petstore/dart2/petstore_client_lib_fake/**
      #- samples/openapi3/client/petstore/dart-dio/petstore_client_lib_fake_tests/**
      #- samples/openapi3/client/petstore/dart-dio/petstore_client_lib_fake-json_serializable/**
      - samples/openapi3/client/petstore/dart-dio/petstore_client_lib_fake/**
      - samples/openapi3/client/petstore/dart-dio/oneof/**
      - samples/openapi3/client/petstore/dart-dio/oneof_polymorphism_and_inheritance/**
      - samples/openapi3/client/petstore/dart-dio/binary_response/**
      - samples/openapi3/client/petstore/dart-dio/petstore-timemachine/**

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      samples: ${{ steps.filter.outputs.samples }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/openapi3/client/petstore/dart-dio/petstore_client_lib_fake
            samples/openapi3/client/petstore/dart-dio/oneof
            samples/openapi3/client/petstore/dart-dio/oneof_polymorphism_and_inheritance
            samples/openapi3/client/petstore/dart-dio/binary_response
            samples/openapi3/client/petstore/dart-dio/petstore-timemachine

  test:
    needs: setup
    if: ${{ needs.setup.outputs.samples != '[]' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        sdk: ["3.9.0"]
        sample: ${{ fromJson(needs.setup.outputs.samples) }}
    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: pub get
        working-directory: ${{ matrix.sample }}
        run: dart pub get

      - name: build_runner build
        working-directory: ${{ matrix.sample }}
        run: dart run build_runner build

      - name: test
        working-directory: ${{ matrix.sample }}
        run: dart test
