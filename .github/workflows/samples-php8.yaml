name: Samples PHP 8.x

on:
  push:
    paths:
      - samples/server/petstore/php-symfony/SymfonyBundle-php/**
      - samples/server/petstore/php-flight/**
      - samples/server/petstore/php-laravel/**
      - samples/server/petstore/php-laravel-issue-21334/**
  pull_request:
    paths:
      - samples/server/petstore/php-symfony/SymfonyBundle-php/**
      - samples/server/petstore/php-flight/**
      - samples/server/petstore/php-laravel/**
      - samples/server/petstore/php-laravel-issue-21334/**
jobs:
  build:
    name: Build PHP projects
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.3"
          - "8.4"
        sample:
          # servers
          - samples/server/petstore/php-symfony/SymfonyBundle-php/
          - samples/server/petstore/php-flight/
          - samples/server/petstore/php-laravel/
          - samples/server/petstore/php-laravel-issue-21334/
    steps:
      - uses: actions/checkout@v7
      - name: Setup PHP with tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          tools: php-cs-fixer, phpunit
      - name: composer install
        working-directory: ${{ matrix.sample }}
        run: composer install
      - name: phpunit
        working-directory: ${{ matrix.sample }}
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            vendor/bin/phpunit -c "$( [ -f phpunit.xml ] && echo phpunit.xml || echo phpunit.xml.dist )"
          elif [ -d tests ]; then
            vendor/bin/phpunit tests
          elif [ -d test ]; then
            vendor/bin/phpunit test
          else
            echo "No PHPUnit config or tests directory in ${{ matrix.sample }}; skipping."
          fi
