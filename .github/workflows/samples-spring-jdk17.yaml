name: Samples Java Spring (JDK17)

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/openapi3/client/petstore/spring-cloud-3-with-optional/**
      - samples/openapi3/client/petstore/spring-cloud-4-with-optional/**
      - samples/client/petstore/spring-http-interface-springboot-4/**
      - samples/openapi3/server/petstore/springboot-3/**
      - samples/openapi3/server/petstore/springboot-4/**
      - samples/openapi3/server/petstore/springboot-4-jspecify/**
      - samples/server/petstore/springboot-api-response-examples/**
      - samples/server/petstore/springboot-lombok-data/**
      - samples/server/petstore/springboot-lombok-tostring/**
      - samples/server/petstore/springboot-file-delegate-optional/**
      - samples/server/petstore/springboot-petstore-with-api-response-examples/**
      - samples/server/petstore/springboot-sort-validation/**
      - samples/server/petstore/springboot-paged-model/**
      - samples/openapi3/server/petstore/spring-boot-oneof-sealed/**
      - samples/openapi3/server/petstore/spring-boot-oneof-interface/**
      - samples/client/petstore/spring-http-interface-oauth/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/openapi3/client/petstore/spring-cloud-3-with-optional/**
      - samples/openapi3/client/petstore/spring-cloud-4-with-optional/**
      - samples/client/petstore/spring-http-interface-springboot-4/**
      - samples/openapi3/server/petstore/springboot-3/**
      - samples/openapi3/server/petstore/springboot-4/**
      - samples/openapi3/server/petstore/springboot-4-jspecify/**
      - samples/server/petstore/springboot-api-response-examples/**
      - samples/server/petstore/springboot-lombok-data/**
      - samples/server/petstore/springboot-lombok-tostring/**
      - samples/server/petstore/springboot-file-delegate-optional/**
      - samples/server/petstore/springboot-petstore-with-api-response-examples/**
      - samples/server/petstore/springboot-sort-validation/**
      - samples/server/petstore/springboot-paged-model/**
      - samples/openapi3/server/petstore/spring-boot-oneof-sealed/**
      - samples/openapi3/server/petstore/spring-boot-oneof-interface/**
      - samples/client/petstore/spring-http-interface-oauth/**
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/openapi3/client/petstore/spring-cloud-3-with-optional
            samples/openapi3/client/petstore/spring-cloud-4-with-optional
            samples/client/petstore/spring-http-interface-springboot-4
            samples/openapi3/server/petstore/springboot-3
            samples/openapi3/server/petstore/springboot-4
            samples/openapi3/server/petstore/springboot-4-jspecify
            samples/server/petstore/springboot-api-response-examples
            samples/server/petstore/springboot-lombok-data
            samples/server/petstore/springboot-lombok-tostring
            samples/server/petstore/springboot-file-delegate-optional
            samples/server/petstore/springboot-petstore-with-api-response-examples
            samples/server/petstore/springboot-sort-validation
            samples/server/petstore/springboot-paged-model
            samples/openapi3/server/petstore/spring-boot-oneof-sealed
            samples/openapi3/server/petstore/spring-boot-oneof-interface
            samples/client/petstore/spring-http-interface-oauth

  build:
    name: Build Java Spring (JDK17)
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Cache maven dependencies
        uses: actions/cache@v5
        env:
          cache-name: maven-repository
        with:
          path: |
            ~/.m2
          key: ${{ runner.os }}-${{ github.job }}-${{ env.cache-name }}-${{ hashFiles('**/pom.xml') }}
      - name: Build
        working-directory: ${{ matrix.sample }}
        run: mvn clean package --no-transfer-progress
