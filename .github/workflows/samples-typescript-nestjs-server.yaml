name: TypeScript NestJS Server

on:
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/server/petstore/typescript-nestjs-server/**
      - .github/workflows/samples-typescript-nestjs-server.yaml
      - .github/workflows/samples-typescript-nestjs-server-parameters.yaml
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      samples: ${{ steps.filter.outputs.samples }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/server/petstore/typescript-nestjs-server

  build:
    name: Test TypeScript NestJS Server
    needs: setup
    if: ${{ needs.setup.outputs.samples != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        sample: ${{ fromJson(needs.setup.outputs.samples) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        working-directory: ${{ matrix.sample }}
        run: |
          npm i

      - name: Test
        working-directory: ${{ matrix.sample }}
        run: npm run test
