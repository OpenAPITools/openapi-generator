name: Python Client (Legacy Model Dictionaries)

on:
  pull_request:
    paths:
      - samples/client/others/python-legacy-model-dictionaries/**
      - .github/workflows/samples-python-client-legacy-model-dictionaries.yaml

jobs:
  build:
    name: Test Python client
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: samples/client/others/python-legacy-model-dictionaries
        run: |
          pip install -r requirements.txt
          pip install -r test-requirements.txt

      - name: Test
        working-directory: samples/client/others/python-legacy-model-dictionaries
        run: python -m unittest discover

      - name: mypy
        working-directory: samples/client/others/python-legacy-model-dictionaries
        run: python -m mypy
