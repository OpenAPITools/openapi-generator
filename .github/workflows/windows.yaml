name: Windows tests

on:
  push:
    branches:
      - master
      - '[5-9]+.[0-9]+.x'
  pull_request:
    branches:
      - master
      - '[5-9]+.[0-9]+.x'

jobs:
  setup:
    name: Detect source changes
    runs-on: ubuntu-latest
    outputs:
      source-changed: ${{ steps.check.outputs.source-changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]] || [[ -z "$BASE_SHA" ]]; then
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [[ -n "$BASE_SHA" ]]; then
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi
          if echo "$CHANGED" | grep -qE '^(modules/|pom\.xml|\.mvn/)'; then
            echo "source-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "source-changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    runs-on: windows-latest
    needs: setup
    if: needs.setup.outputs.source-changed == 'true'
    strategy:
      matrix:
        java: [11, 17]
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle
      - name: Cache maven dependencies
        uses: actions/cache@v5
        env:
          cache-name: cache-maven-repository
        with:
          path: |
            ~/.m2/repository
            ~/.gradle
            !~/.gradle/caches/*/plugin-resolution/
            !~/.m2/repository/org/openapitools/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
      - name: Setup Maven
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-version: ${{ matrix.java }}
          maven-version: 3.8.8
      - name: Run maven
        run: ./mvnw clean --no-snapshot-updates --batch-mode --quiet install
        env:
          GRADLE_ENTERPRISE_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
      - name: Test Template Retrieval
        run: |
          cd modules/openapi-generator-cli/target
          # generator names containing "-" caused problems in the past, see https://github.com/OpenAPITools/openapi-generator/issues/9528
          java -jar ./openapi-generator-cli.jar author template --verbose  -g jaxrs-spec --library quarkus
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.14.3'
      - name: Gradle tests
        run: |
          gradle -b modules/openapi-generator-gradle-plugin/samples/local-spec/build.gradle buildGoSdk --stacktrace
