name: Samples Scala/sbt client

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/client/petstore/scalaz/**
      - samples/client/petstore/scala-pekko/**
      - samples/client/petstore/scala-http4s/**
      - samples/client/petstore/scala-sttp4-jsoniter/**
      - samples/client/petstore/scala-akka/**
      - samples/client/petstore/scala-sttp/**
      - samples/client/petstore/scala-sttp-circe/**
      - samples/client/petstore/scala-sttp4/**
      - samples/client/petstore/scala-sttp4-circe/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - samples/client/petstore/scalaz/**
      - samples/client/petstore/scala-pekko/**
      - samples/client/petstore/scala-http4s/**
      - samples/client/petstore/scala-sttp4-jsoniter/**
      - samples/client/petstore/scala-akka/**
      - samples/client/petstore/scala-sttp/**
      - samples/client/petstore/scala-sttp-circe/**
      - samples/client/petstore/scala-sttp4/**
      - samples/client/petstore/scala-sttp4-circe/**
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/client/petstore/scalaz
            samples/client/petstore/scala-pekko
            samples/client/petstore/scala-http4s
            samples/client/petstore/scala-sttp4-jsoniter
            samples/client/petstore/scala-akka
            samples/client/petstore/scala-sttp
            samples/client/petstore/scala-sttp-circe
            samples/client/petstore/scala-sttp4
            samples/client/petstore/scala-sttp4-circe
            80:8080

  build:
    name: Build sbt/Scala
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - name: Add hosts to /etc/hosts
        run: |
            sudo echo "127.0.0.1 petstore.swagger.io" | sudo tee -a /etc/hosts
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 11
      - name: Setup sbt launcher
        uses: sbt/setup-sbt@v1
      - name: Cache maven dependencies
        uses: actions/cache@v5
        env:
          cache-name: maven-repository
        with:
          path: |
            ~/.ivy2
          key: ${{ runner.os }}-${{ github.job }}-${{ env.cache-name }}-${{ hashFiles('**/build.sbt') }}
      - name: Build and test
        working-directory: ${{ matrix.sample }}
        run: sbt -v test
