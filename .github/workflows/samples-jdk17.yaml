name: Samples JDK17
on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      # clients
      - samples/openapi3/client/petstore/spring-cloud-3/**
      - samples/client/petstore/java-helidon-client/v3/mp/**
      - samples/client/petstore/java-helidon-client/v3/se/**
      - samples/client/petstore/spring-http-interface-reactive/**
      - samples/client/petstore/spring-http-interface-reactive-bean-validation/**
      - samples/client/petstore/spring-http-interface-bean-validation/**
      - samples/client/petstore/spring-http-interface/**
      - samples/client/petstore/spring-http-interface-reactive-noResponseEntity/**
      - samples/client/petstore/spring-http-interface-noResponseEntity/**
      - samples/client/petstore/spring-http-interface-useHttpServiceProxyFactoryInterfacesConfigurator/**
      - samples/client/petstore/java/webclient-jakarta/**
      - samples/client/petstore/java/microprofile-rest-client-outer-enum/**
      # servers
      - samples/openapi3/server/petstore/springboot-3/**
      - samples/openapi3/server/petstore/springboot-3-include-http-request-context/**
      - samples/server/petstore/springboot-x-implements-skip/**
      - samples/server/petstore/java-camel/**
      - samples/server/petstore/java-helidon-server/v3/mp/**
      - samples/server/petstore/java-helidon-server/v3/se/**
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      # clients
      - samples/openapi3/client/petstore/spring-cloud-3/**
      - samples/client/petstore/java-helidon-client/v3/mp/**
      - samples/client/petstore/java-helidon-client/v3/se/**
      - samples/client/petstore/spring-http-interface-reactive/**
      - samples/client/petstore/spring-http-interface-reactive-bean-validation/**
      - samples/client/petstore/spring-http-interface-bean-validation/**
      - samples/client/petstore/spring-http-interface/**
      - samples/client/petstore/spring-http-interface-reactive-noResponseEntity/**
      - samples/client/petstore/spring-http-interface-noResponseEntity/**
      - samples/client/petstore/spring-http-interface-useHttpServiceProxyFactoryInterfacesConfigurator/**
      - samples/client/petstore/java/webclient-jakarta/**
      - samples/client/petstore/java/microprofile-rest-client-outer-enum/**
      # servers
      - samples/openapi3/server/petstore/springboot-3/**
      - samples/openapi3/server/petstore/springboot-3-include-http-request-context/**
      - samples/server/petstore/springboot-x-implements-skip/**
      - samples/server/petstore/java-camel/**
      - samples/server/petstore/java-helidon-server/v3/mp/**
      - samples/server/petstore/java-helidon-server/v3/se/**
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/openapi3/client/petstore/spring-cloud-3
            samples/client/petstore/java-helidon-client/v3/mp/
            samples/client/petstore/java-helidon-client/v3/se
            samples/client/petstore/spring-http-interface-reactive
            samples/client/petstore/spring-http-interface-reactive-bean-validation
            samples/client/petstore/spring-http-interface-bean-validation
            samples/client/petstore/spring-http-interface
            samples/client/petstore/spring-http-interface-reactive-noResponseEntity
            samples/client/petstore/spring-http-interface-noResponseEntity
            samples/client/petstore/spring-http-interface-useHttpServiceProxyFactoryInterfacesConfigurator
            samples/client/petstore/java/webclient-jakarta
            samples/client/petstore/java/microprofile-rest-client-outer-enum
            samples/openapi3/server/petstore/springboot-3
            samples/openapi3/server/petstore/springboot-3-include-http-request-context
            samples/server/petstore/springboot-x-implements-skip
            samples/server/petstore/java-camel/
            samples/server/petstore/java-helidon-server/v3/mp/
            samples/server/petstore/java-helidon-server/v3/se

  build:
    name: Build with JDK17
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Cache maven dependencies
        uses: actions/cache@v5
        env:
          cache-name: maven-repository
        with:
          path: |
            ~/.m2
          key: ${{ runner.os }}-${{ github.job }}-${{ env.cache-name }}-${{ hashFiles('**/pom.xml') }}
      - name: Build
        working-directory: ${{ matrix.sample }}
        run: mvn clean package --no-transfer-progress
