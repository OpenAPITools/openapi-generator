name: Samples Rust Clients

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - "samples/client/others/rust/**"
      - "samples/client/petstore/rust-server/**"
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - "samples/client/others/rust/**"
      - "samples/client/petstore/rust/**"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/client/others/rust/
            samples/client/petstore/rust/

  build:
    name: Build Rust
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    services:
      petstore-api:
        image: swaggerapi/petstore
        ports:
          - 80:8080
        env:
          SWAGGER_HOST: http://petstore.swagger.io
          SWAGGER_BASE_PATH: /v2
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false # Don't cache workspace target directories as they don't exist
          cache-directories:
            ${{ matrix.sample }}/target
          workspaces: |
            ${{ matrix.sample }}/output/*

      - name: Build
        working-directory: ${{ matrix.sample }}
        run: cargo build --all-targets --all-features
      - name: Tests
        working-directory: ${{ matrix.sample }}
        run: |
          set -e

          # Iterate through each example and test various features
          for package in $(find . -maxdepth 1 -mindepth 1 -type d)
          do
            # Not all versions have a client example
            if test -f examples/client/main.rs; then
              cargo build --example client --features="client"
            fi

            # Test the CLI works if present
            if test -f bin/cli.rs; then
              cargo build --bin ${package##*/} --features cli
              target/debug/${package##*/} --help
            fi
            cargo fmt
            cargo test
            cargo clippy
            cargo doc
          done
