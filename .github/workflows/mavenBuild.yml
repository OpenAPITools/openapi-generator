# Maven CI build for the smals-belgium openapi-generator
name: openapi-generator-maven-ci
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      - name: Update maven groupId
        run: |
          set -euo pipefail
          
          ROOT_POM="pom.xml"
          NEW_GROUP_ID="io.github.smals-belgium"
          OLD_GROUP_ID="org.openapitools"
          
          mapfile -t MODULE_POMS < <(find modules -type f -name pom.xml)
          
          replace_group_id() {
          local file="$1"
          sed -i "s|<groupId>${OLD_GROUP_ID}</groupId>|<groupId>${NEW_GROUP_ID}</groupId>|g" "$file"
          }
          
          # --- UPDATE ROOT POM ---
          if grep -q "<artifactId>openapi-generator-project</artifactId>" "$ROOT_POM"; then
          echo "Updating groupId in root pom"
          replace_group_id "$ROOT_POM"
          
          echo "Updating enforcer exclude in root pom"
          sed -i "s|<exclude>${OLD_GROUP_ID}:\*</exclude>|<exclude>${NEW_GROUP_ID}:*</exclude>|g" "$ROOT_POM"
          fi
          
          # --- UPDATE MODULE POMS ---
          for pom in "${MODULE_POMS[@]}"; do
          echo "Updating groupId in $pom"
          replace_group_id "$pom"
          done
      - name: Build with Maven
        run: mvn -B verify