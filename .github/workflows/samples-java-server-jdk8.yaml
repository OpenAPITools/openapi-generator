name: Samples Java Server

on:
  push:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - 'samples/server/petstore/java-vertx-web/**'
      - 'samples/server/petstore/java-inflector/**'
      - 'samples/server/petstore/java-pkmst/**'
      # test in circleci instead
      - 'samples/server/petstore/java-undertow/**'
      - 'samples/server/petstore/java-microprofile/**'
  pull_request:
    # Determines whether this workflow fires at all. Keep in sync with all_samples: in the setup job below.
    paths:
      - 'samples/server/petstore/java-vertx-web/**'
      - 'samples/server/petstore/java-inflector/**'
      - 'samples/server/petstore/java-pkmst/**'
      #- 'samples/server/petstore/java-undertow/**'
      - 'samples/server/petstore/java-microprofile/**'
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/compute-matrix
        with:
          # List of sample directories to consider building (one per line).
          # Action inputs don't support arrays, so this is a newline-delimited string parsed in the action script.
          # To add a new sample: add it here AND add a matching entry to the paths: trigger above.
          all_samples: |
            samples/server/petstore/java-vertx-web/
            samples/server/petstore/java-inflector/
            samples/server/petstore/java-pkmst/
            samples/server/petstore/java-microprofile/
            # Commented-out samples from original matrix:
            #- samples/server/petstore/java-undertow/

  build:
    name: Build Java Server
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 8
      - name: Cache maven dependencies
        uses: actions/cache@v5
        env:
          cache-name: maven-repository
        with:
          path: |
            ~/.m2
          key: ${{ runner.os }}-${{ github.job }}-${{ env.cache-name }}-${{ hashFiles('**/pom.xml') }}
      - name: Build
        working-directory: ${{ matrix.sample }}
        run: mvn clean package --no-transfer-progress
